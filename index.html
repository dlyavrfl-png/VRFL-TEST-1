<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE</title>
    <style>
        :root { --neon: #00d2ff; --accent: #0055ff; --bg: #050508; --card: #0d111a; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* Узор на фоне */
        .bg-pattern { position: fixed; inset: 0; z-index: -1; background-image: 
            radial-gradient(circle at 50% 0%, #101525 0%, transparent 50%),
            url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 30-30 30L0 30z' fill='%230055ff' fill-opacity='0.03'/%3E%3C/svg%3E");
        }

        .header { padding: 15px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .main-content { height: calc(100vh - 130px); overflow-y: auto; padding: 15px; scrollbar-width: none; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 10px; position: relative; overflow: hidden; }
        .card::after { content: ''; position: absolute; top:0; left:0; width:3px; height:100%; background: var(--neon); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #080a10; border-top: 1px solid var(--glass); padding: 12px 0; justify-content: space-around; }
        .nav-item { text-align: center; font-size: 10px; color: #4e5761; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-outline { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 8px; border-radius: 6px; font-size: 11px; }

        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 8px 15px; background: var(--glass); border-radius: 20px; font-size: 12px; white-space: nowrap; }
        .tab.active { background: var(--accent); }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td, th { padding: 10px 5px; text-align: left; border-bottom: 1px solid var(--glass); }
        .ovr { background: var(--neon); color: #000; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="header">
    <div style="font-weight:900; letter-spacing:2px; color:var(--neon)">VRFL ELITE</div>
    <div id="top-money" style="color:#ffd700; font-size:14px">0 €</div>
</div>

<div class="main-content">
    <div id="sc-home" class="screen active">
        <h3 style="margin-top:0">ТУРНИРЫ</h3>
        <div class="card" style="background: linear-gradient(135deg, #0a1f44, #050508);">
            <div style="font-size:12px; opacity:0.6">ОСНОВНОЙ ЧЕМПИОНАТ</div>
            <div style="font-size:18px; font-weight:bold; margin:5px 0">VRFL PREMIER LEAGUE</div>
            <button class="btn-outline" onclick="nav('sc-league')">ВОЙТИ В ТУРНИР</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="card" style="opacity:0.6"><h4>КУБОК VRFL</h4><span style="font-size:10px">СКОРО</span></div>
            <div class="card" style="opacity:0.6"><h4>CHAMPIONS</h4><span style="font-size:10px">СКОРО</span></div>
        </div>
        <h3>ИНДИВИДУАЛЬНЫЕ НАГРАДЫ</h3>
        <div id="awards-preview"></div>
    </div>

    <div id="sc-league" class="screen">
        <div class="tab-menu">
            <div class="tab active" onclick="setLeagueTab('table', this)">ТАБЛИЦА</div>
            <div class="tab" onclick="setLeagueTab('clubs', this)">КЛУБЫ</div>
            <div class="tab" onclick="setLeagueTab('market', this)">ТРАНСФЕРЫ</div>
        </div>
        
        <div id="league-content">
            <div class="card"><div id="l-table-div"></div></div>
            <button class="btn" onclick="playFullRound()">СИМУЛИРОВАТЬ ТУР</button>
            <div id="l-matches-div" style="margin-top:15px"></div>
        </div>
    </div>

    <div id="sc-profile" class="screen">
        <div class="tab-menu">
            <div class="tab active" onclick="setProfileMode('player', this)">РЕЖИМ ИГРОКА</div>
            <div class="tab" onclick="setProfileMode('manager', this)">РЕЖИМ МЕНЕДЖЕРА</div>
        </div>
        <div id="profile-content"></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
    <div class="nav-item" onclick="nav('sc-league', this)">ЛИГА</div>
    <div class="nav-item" onclick="nav('sc-profile', this)">ПРОФИЛЬ</div>
</div>

<script>
    let db = {
        money: 50,
        mode: 'player', // 'player' or 'manager'
        round: 1,
        userTeamId: 0,
        teams: [
            { id: 0, name: "Cardillero", ovr: 80, pts: 0, w:0, d:0, l:0, players: [{n:"Vaksekov", r:88, g:0}, {n:"Dizzik", r:85, g:0}], budget: 100 },
            { id: 1, name: "Lions", ovr: 76, pts: 0, w:0, d:0, l:0, players: [{n:"Gulik", r:86, g:0}], budget: 80 },
            { id: 2, name: "Rovers", ovr: 72, pts: 0, w:0, d:0, l:0, players: [{n:"Rose", r:75, g:0}], budget: 60 },
            { id: 3, name: "Torpedo", ovr: 74, pts: 0, w:0, d:0, l:0, players: [{n:"Torp", r:74, g:0}], budget: 70 }
        ],
        market: [{n:"Mbappe", r:92, p:200}, {n:"Haaland", r:91, p:190}],
        history: []
    };

    function save() { localStorage.setItem('vrfl_elite_v1', JSON.stringify(db)); }
    function load() {
        const data = localStorage.getItem('vrfl_elite_v1');
        if(data) db = JSON.parse(data);
        renderAll();
    }

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        renderAll();
    }

    function setLeagueTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const cont = document.getElementById('league-content');
        if(tab === 'table') {
            cont.innerHTML = `<div class="card"><div id="l-table-div"></div></div><button class="btn" onclick="playFullRound()">СИМУЛИРОВАТЬ ТУР</button><div id="l-matches-div"></div>`;
            renderTable();
        } else if(tab === 'clubs') {
            let h = '';
            db.teams.forEach(t => h += `<div class="card"><b>${t.name}</b><br><small>Игроков: ${t.players.length} | OVR: ${t.ovr}</small></div>`);
            cont.innerHTML = h;
        } else if(tab === 'market') {
            let h = '';
            db.market.forEach((p, i) => h += `<div class="card" style="display:flex; justify-content:space-between"><span>${p.n} (<span class="ovr">${p.r}</span>)</span> <button class="btn-outline" onclick="buy(${i})">${p.p}M</button></div>`);
            cont.innerHTML = h || 'Рынок пуст';
        }
    }

    function setProfileMode(m, el) {
        db.mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProfile();
    }

    function playFullRound() {
        let pairs = [[0,1], [2,3]];
        pairs.forEach(p => {
            let t1 = db.teams[p[0]], t2 = db.teams[p[1]];
            let s1 = Math.floor(Math.random() * (t1.ovr/20));
            let s2 = Math.floor(Math.random() * (t2.ovr/22));
            if(s1 > s2) { t1.pts+=3; t1.w++; t2.l++; } else if(s1 < s2) { t2.pts+=3; t2.w++; t1.l++; } else { t1.pts++; t2.pts++; t1.d++; t2.d++; }
            
            let scorers = [];
            for(let i=0; i<s1; i++) {
                let pl = t1.players[Math.floor(Math.random()*t1.players.length)];
                pl.g++; scorers.push(pl.n);
            }
            db.history.unshift({t1: t1.name, t2: t2.name, s1, s2, scorers});
        });
        db.round++;
        save(); renderTable();
    }

    function renderTable() {
        let h = '<table><tr><th>КЛУБ</th><th>В-Н-П</th><th>О</th></tr>';
        [...db.teams].sort((a,b)=>b.pts - a.pts).forEach(t => {
            h += `<tr><td>${t.name}</td><td>${t.w}-${t.d}-${t.l}</td><td>${t.pts}</td></tr>`;
        });
        document.getElementById('l-table-div').innerHTML = h + '</table>';
        
        let mh = '';
        db.history.slice(0, 4).forEach(m => {
            mh += `<div class="card" style="text-align:center; font-size:12px">${m.t1} <b>${m.s1}:${m.s2}</b> ${m.t2}<br><small style="color:var(--neon)">${m.scorers.join(', ')}</small></div>`;
        });
        document.getElementById('l-matches-div').innerHTML = mh;
    }

    function renderProfile() {
        const cont = document.getElementById('profile-content');
        let ut = db.teams[db.userTeamId];
        if(db.mode === 'player') {
            let hero = ut.players[0];
            cont.innerHTML = `<div class="card"><h3>${hero.n}</h3><p>ГОЛЫ: ${hero.g}</p><p>РЕЙТИНГ: <span class="ovr">${hero.r}</span></p></div>`;
        } else {
            let ph = ut.players.map(p => `<div>${p.n} (${p.r})</div>`).join('');
            cont.innerHTML = `<div class="card"><h3>МЕНЕДЖЕР: ${ut.name}</h3><p>БЮДЖЕТ: ${db.money}M</p><h4>СОСТАВ:</h4>${ph}</div>`;
        }
    }

    function renderAll() {
        document.getElementById('top-money').innerText = db.money + ' M €';
        if(document.getElementById('l-table-div')) renderTable();
        renderProfile();
    }

    window.onload = load;
</script>
</body>
</html>
