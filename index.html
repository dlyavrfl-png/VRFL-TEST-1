<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE 2026</title>
    <style>
        :root { --neon: #00f2ff; --accent: #7000ff; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.03); --card-bg: #161b22; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        /* Тот самый узор на фоне */
        .bg-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.05; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 40px 40px; }

        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; scrollbar-width: none; }
        
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .btn { background: linear-gradient(90deg, var(--accent), #b000ff); border: none; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #0d1117; border-top: 1px solid var(--glass); padding: 10px 0; justify-content: space-around; backdrop-filter: blur(15px); }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; opacity: 0.6; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--neon); opacity: 1; text-shadow: 0 0 10px var(--neon); }

        .logo-img { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; vertical-align: middle; margin-right: 10px; background: #000; }
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; }
        .match-row:active { border-color: var(--neon); }
        .match-score { font-size: 18px; font-weight: 900; color: var(--neon); letter-spacing: 2px; }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; flex-direction: column; justify-content: center; backdrop-filter: blur(5px); }
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; padding: 25px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div id="setup-screen" style="display:none">
    <h1 style="color:var(--neon); margin-bottom: 5px;">VRFL ELITE</h1>
    <p style="color:#8b949e; font-size: 12px; margin-bottom: 30px;">ДОБРО ПОЖАЛОВАТЬ В БЕТА-ТЕСТ</p>
    <div id="setup-list" style="overflow-y:auto; flex-grow: 1;"></div>
</div>

<div class="app-container">
    <div class="header">
        <div style="font-weight: 900;"><span style="color:var(--neon)">VRFL</span> ELITE</div>
        <div id="user-money" style="font-weight:bold; color:#ffcf00">0 M €</div>
    </div>

    <div class="main-content">
        <div id="sc-home" class="screen active">
            <div class="card" style="background: linear-gradient(45deg, #1a1a2e, #16213e); border-left: 4px solid var(--neon);">
                <h2 style="margin:0" id="my-team-display">Загрузка...</h2>
                <p style="color:#8b949e; font-size:12px">Текущий сезон: 2026</p>
            </div>
            
            <h4 style="color:#8b949e; text-transform: uppercase; font-size: 11px;">Клубы лиги</h4>
            <div id="home-clubs-list"></div>
        </div>

        <div id="sc-league" class="screen">
            <div style="display:flex; gap:10px; margin-bottom:15px">
                <button class="btn" style="flex:1" onclick="switchLeagueTab('table')">ТАБЛИЦА</button>
                <button class="btn" style="flex:1; background: #161b22; border: 1px solid #333;" onclick="switchLeagueTab('market')">РЫНОК</button>
            </div>
            <div id="league-content"></div>
        </div>

        <div id="sc-club" class="screen">
            <div class="card">
                <h3 style="margin-top:0">Создание игрока</h3>
                <input type="text" id="player-name-input" placeholder="Имя вашего игрока..." style="width:100%; padding:12px; background:#0b0e14; border:1px solid #333; color:#fff; border-radius:8px; box-sizing: border-box;">
                <button class="btn" style="margin-top:10px" onclick="createMyPlayer()">ОБНОВИТЬ СОСТАВ</button>
            </div>
            <div id="my-squad-list"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="nav('sc-league', this)">ЛИГА</div>
        <div class="nav-item" onclick="nav('sc-club', this)">МОЙ КЛУБ</div>
    </div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="card" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<script>
    let state = {
        userTeamId: -1,
        money: 100,
        teams: [
            { id: 0, name: "Aurelian United", logo: "https://i.ibb.co.com/chQPDKjg/IMG-20260315-111459-312.png", pts: 0, w:0, d:0, l:0, players: [{n:"Тигран Казарян", r:90}, {n:"Stepaneko", r:89}, {n:"Vortexov", r:82}] },
            { id: 1, name: "FC Cardillero", logo: "https://i.ibb.co.com/PsmJjzJt/1773555326089.png", pts: 0, w:0, d:0, l:0, players: [{n:"Нелисек", r:90}, {n:"Atacker", r:88}, {n:"LeBoomich", r:87}] },
            { id: 2, name: "Torpedo", logo: "https://i.ibb.co.com/j9Sw1gpB/IMG-20260315-111455-660.png", pts: 0, w:0, d:0, l:0, players: [{n:"Фил", r:95}, {n:"Демпик", r:90}, {n:"Ангел", r:84}] },
            { id: 3, name: "FC Potential", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Niko", r:90}, {n:"Flozzy Jr", r:82}, {n:"iron", r:81}] },
            { id: 4, name: "FC Outsiders", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Солевой", r:50}, {n:"Костылин", r:55}, {n:"Вороговский", r:50}] }
        ],
        results: [],
        leagueTab: 'table'
    };

    function save() { localStorage.setItem('vrfl_elite_save', JSON.stringify(state)); }
    function load() {
        const saved = localStorage.getItem('vrfl_elite_save');
        if(saved) state = JSON.parse(saved);
        if(state.userTeamId === -1) document.getElementById('setup-screen').style.display = 'flex';
        updateUI();
    }

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        updateUI();
    }

    function selectClub(id) {
        state.userTeamId = id;
        document.getElementById('setup-screen').style.display = 'none';
        save();
        updateUI();
    }

    function createMyPlayer() {
        const name = document.getElementById('player-name-input').value;
        if(name) {
            state.teams[state.userTeamId].players.unshift({n: name, r: 85});
            alert("Вы добавлены в состав как капитан!");
            save();
            updateUI();
        }
    }

    function simulateRound() {
        let round = [];
        let t = [...state.teams].sort(() => Math.random() - 0.5);
        for(let i=0; i<t.length-1; i+=2) {
            let s1 = Math.floor(Math.random()*5), s2 = Math.floor(Math.random()*3);
            if(s1 > s2) { t[i].pts += 3; t[i].w++; t[i+1].l++; }
            else if(s1 < s2) { t[i+1].pts += 3; t[i+1].w++; t[i].l++; }
            else { t[i].pts++; t[i+1].pts++; t[i].d++; t[i+1].d++; }
            
            let scorers = s1 > 0 ? [t[i].players[0].n] : [];
            round.push({t1: t[i], t2: t[i+1], s1, s2, scorers});
        }
        state.results = [...round, ...state.results];
        save();
        updateUI();
    }

    function switchLeagueTab(tab) {
        state.leagueTab = tab;
        updateUI();
    }

    function buyPlayer(teamId, playerIdx) {
        let seller = state.teams[teamId];
        let p = seller.players[playerIdx];
        let price = Math.round(p.r / 2);

        if(state.money >= price) {
            state.money -= price;
            state.teams[state.userTeamId].players.push(p);
            seller.players.splice(playerIdx, 1);
            alert(`${p.n} перешел в ваш клуб!`);
            save();
            updateUI();
        } else {
            alert("Недостаточно денег!");
        }
    }

    function showMatchStats(idx) {
        let m = state.results[idx];
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <div style="text-align:center">
                <h3>${m.t1.name} ${m.s1}:${m.s2} ${m.t2.name}</h3>
                <p style="color:var(--neon)">АВТОРЫ ГОЛОВ:</p>
                <p>${m.scorers.join(', ') || 'Нет голов'}</p>
                <div style="display:flex; justify-content:space-around; margin-top:20px; font-size:12px; color:#8b949e">
                    <span>Удары: ${m.s1+4}</span><span>Владение: 50/50</span>
                </div>
            </div>
        `;
    }

    function updateUI() {
        if(state.userTeamId === -1) {
            let h = '';
            state.teams.forEach(t => h += `<div class="card" onclick="selectClub(${t.id})"><img src="${t.logo}" class="logo-img"><b>${t.name}</b></div>`);
            document.getElementById('setup-list').innerHTML = h;
            return;
        }

        document.getElementById('user-money').innerText = state.money + ' M €';
        document.getElementById('my-team-display').innerText = state.teams[state.userTeamId].name;

        // Главная
        document.getElementById('home-clubs-list').innerHTML = state.teams.map(t => `
            <div class="match-row" onclick="openClubModal(${t.id})">
                <span><img src="${t.logo}" class="logo-img"><b>${t.name}</b></span>
                <span style="color:#4e5761; font-size:11px">СОСТАВ</span>
            </div>
        `).join('');

        // Лига
        if(state.leagueTab === 'table') {
            let tbl = '<table>';
            [...state.teams].sort((a,b)=>b.pts-a.pts).forEach((t, i) => {
                tbl += `<tr><td style="width:20px">${i+1}</td><td><img src="${t.logo}" class="logo-img">${t.name}</td><td style="text-align:right"><b>${t.pts}</b></td></tr>`;
            });
            document.getElementById('league-content').innerHTML = `<div class="card">${tbl}</table></div><button class="btn" onclick="simulateRound()">ИГРАТЬ ТУР</button><div id="match-results" style="margin-top:15px"></div>`;
            document.getElementById('match-results').innerHTML = state.results.slice(0, 4).map((m, i) => `
                <div class="match-row" onclick="showMatchStats(${i})">
                    <span>${m.t1.name}</span><span class="match-score">${m.s1}:${m.s2}</span><span>${m.t2.name}</span>
                </div>
            `).join('');
        } else {
            // Рынок
            let mkt = '';
            state.teams.forEach(t => {
                if(t.id !== state.userTeamId) {
                    t.players.forEach((p, pi) => {
                        mkt += `<div class="card" style="display:flex; justify-content:space-between; align-items:center">
                            <div><b>${p.n}</b> <small style="color:#8b949e">(${t.name})</small><br><span style="color:var(--neon)">${Math.round(p.r/2)}M €</span> • OVR ${p.r}</div>
                            <button class="btn" style="width:auto; padding:5px 15px" onclick="buyPlayer(${t.id}, ${pi})">КУПИТЬ</button>
                        </div>`;
                    });
                }
            });
            document.getElementById('league-content').innerHTML = mkt;
        }

        // Мой клуб
        document.getElementById('my-squad-list').innerHTML = state.teams[state.userTeamId].players.map(p => `
            <div class="match-row"><span>${p.n}</span><b style="color:var(--neon)">${p.r}</b></div>
        `).join('');
    }

    function openClubModal(id) {
        let t = state.teams[id];
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `<h3>${t.name}</h3>` + t.players.map(p => `<p>${p.n} - ${p.r} OVR</p>`).join('');
    }

    load();
</script>
</body>
</html>
