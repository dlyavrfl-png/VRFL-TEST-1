<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE | ULTIMATE FIX</title>
    <style>
        :root { --neon: #00f2ff; --accent: #7000ff; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.05); --card-bg: #161b22; --yellow: #ffcf00; --ucl: #1e3c72; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .app { height: 100vh; display: flex; flex-direction: column; display: none; }
        .header { padding: 12px; background: #000; border-bottom: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; }
        .content { flex: 1; overflow-y: auto; padding: 10px 10px 100px 10px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.2s ease; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: linear-gradient(90deg, var(--accent), #b000ff); border: none; color: #fff; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-sec { background: #21262d; border: 1px solid #333; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #0d1117; border-top: 1px solid var(--glass); padding: 10px 0; justify-content: space-around; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; opacity: 0.6; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        .nav-item.active { color: var(--neon); opacity: 1; background: rgba(0, 242, 255, 0.1); }
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
        .score-box { font-size: 14px; font-weight: 900; color: var(--neon); background: #000; padding: 4px 8px; border-radius: 6px; }
        .rating-badge { background: var(--yellow); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 11px; }
        #modal { position: fixed; inset: 0; background: rgba(11, 14, 20, 0.98); z-index: 20000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-close { position: fixed; top: 15px; right: 15px; font-size: 28px; color: #fff; z-index: 20001; cursor: pointer; background: #000; border-radius: 50%; width: 40px; height: 40px; text-align: center; line-height: 38px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #8b949e; border-bottom: 1px solid #333; padding: 5px; }
        td { padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ucl-card { background: linear-gradient(135deg, #1e3c72, #2a5298); border: 1px solid #4a90e2; }
        #start-screen { position: fixed; inset: 0; background: var(--bg); z-index: 40000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .slot-btn { padding: 12px 2px; background: var(--card-bg); border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="start-screen">
    <div id="slot-selector">
        <h3 style="text-align:center; color:var(--neon)">VRFL ELITE: LAUNCH</h3>
        <div class="slot-grid" id="slot-container"></div>
    </div>
    <div id="team-selector" style="display:none; margin-top:20px">
        <h3 style="text-align:center; color:var(--neon)">ВЫБЕРИТЕ ВАШ КЛУБ</h3>
        <div id="setup-list"></div>
    </div>
</div>

<div class="app">
    <div class="header">
        <div style="font-weight: 900;"><span style="color:var(--neon)">VRFL</span> ELITE</div>
        <div id="u-money" style="font-weight:bold; color:var(--yellow);">250 M €</div>
    </div>
    <div class="content">
        <div id="sc-home" class="screen active">
            <div id="my-club-card"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 15px;">
                <button class="btn btn-sec" onclick="exportData()">💾 СЕЙВ</button>
                <button class="btn btn-sec" onclick="resetSeason()">🔄 СБРОС</button>
                <button class="btn" style="grid-column: span 2;" onclick="openCasino()">🎰 КАЗИНО (LUCKY 7)</button>
            </div>
            <h4 style="color:#8b949e">ТУРНИРНАЯ ТАБЛИЦА</h4>
            <div class="card" id="main-table-container"></div>
        </div>

        <div id="sc-tournaments" class="screen">
            <div style="display:flex; gap:5px; margin-bottom:15px">
                <button class="btn" onclick="setTab('league')">ЛИГА</button>
                <button class="btn btn-sec" onclick="setTab('ucl')">UCL</button>
                <button class="btn btn-sec" onclick="setTab('market')">РЫНОК</button>
            </div>
            <div id="tournament-view"></div>
        </div>

        <div id="sc-club" class="screen">
            <div class="card" style="border:1px solid var(--accent)">
                <div id="active-tactic-name" style="color:var(--neon); font-weight:bold;">Acsor (Баланс)</div>
                <button class="btn btn-sec" style="margin-top:10px" onclick="openTactics()">ТАКТИКА</button>
            </div>
            <h4 style="color:#8b949e">СОСТАВ</h4>
            <div id="my-squad"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="nav('sc-tournaments', this)">ТУРНИРЫ</div>
        <div class="nav-item" onclick="nav('sc-club', this)">КЛУБ</div>
    </div>
</div>

<div id="modal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div id="modal-body" style="padding:50px 15px 30px 15px;"></div>
</div>

<script>
    let activeSlot = null, storageKey = '', db = null;
    const baseTeams = [
        { id: 0, name: "Torpedo", logo: "https://i.ibb.co.com/r2g3f2Y6/1773561875719.png", players: [{n:"Ангел", r:80, p:"ВРТ"}, {n:"Фил", r:95, p:"ЛВ"}, {n:"Макс", r:90, p:"ФРВ"}]},
        { id: 1, name: "Fc Cardillero", logo: "https://i.ibb.co.com/PsmJjzJt/1773555326089.png", players: [{n:"LeBoomich", r:90, p:"ФРВ"}, {n:"Atacker", r:90, p:"ЛВ"}]},
        { id: 2, name: "Fc Potential", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", players: [{n:"Niko", r:90, p:"ЦП"}, {n:"Egorinho", r:70, p:"ЛП"}]},
        { id: 3, name: "Aurelian United", logo: "https://i.ibb.co.com/chQPDKjg/IMG-20260315-111459-312.png", players: [{n:"Тигран Казарян", r:90, p:"НАП"}, {n:"Vortexov", r:80, p:"ПВ"}]},
        { id: 4, name: "Fc Outsiders", logo: "https://i.ibb.co.com/xKbvhDsM/1773561900834.png", players: [{n:"Вороговский", r:60, p:"ПВ"}, {n:"Вильнюс", r:60, p:"НАП"}]}
    ];

    function selectSlot(n) { 
        activeSlot = n; storageKey = `vrfl_elite_final_s${n}`; 
        const s = localStorage.getItem(storageKey); 
        document.getElementById('slot-selector').style.display='none'; 
        if(s){ db=JSON.parse(s); startGame(); } else showTeamSelector(); 
    }
    
    function showTeamSelector() { 
        document.getElementById('team-selector').style.display='block'; 
        document.getElementById('setup-list').innerHTML = baseTeams.map(t => 
            `<div class="card" style="display:flex; justify-content:space-between; align-items:center" onclick="initNew(${t.id})">
                <span>${t.name}</span>
                <button class="btn" style="width:auto">ВЫБРАТЬ</button>
            </div>`
        ).join(''); 
    }

    function initNew(tid) { 
        db = { 
            userTeamId: tid, money: 250, round: 1, view: 'league', tactic: 'Acsor',
            teams: baseTeams.map(t => ({ ...t, pts: 0, w:0, d:0, l:0, gf:0, ga:0, players: t.players.map(p => ({...p, g:0, rating: p.r})) })), 
            history: []
        };
        save(); startGame(); 
    }

    function startGame() { 
        document.getElementById('start-screen').style.display='none'; 
        document.querySelector('.app').style.display='flex'; 
        updateUI(); 
    }

    function save() { localStorage.setItem(storageKey, JSON.stringify(db)); }

    function simLeague() {
        let t1 = db.teams[db.userTeamId];
        let others = db.teams.filter(t => t.id !== t1.id);
        let t2 = others[Math.floor(Math.random()*others.length)];
        
        let s1 = Math.floor(Math.random()*5), s2 = Math.floor(Math.random()*3);
        const getMatchData = (team, goals) => {
            let res = [];
            team.players.forEach(p => p.curRat = (Math.random()*3+6.5).toFixed(1));
            for(let i=0; i<goals; i++) {
                let p = team.players[Math.floor(Math.random()*team.players.length)];
                p.g++; p.curRat = (parseFloat(p.curRat)+1).toFixed(1);
                res.push(p.n);
            }
            return res;
        };

        let match = { t1: t1.name, t2: t2.name, s1, s2, e1: getMatchData(t1, s1), e2: getMatchData(t2, s2), 
                      r1: t1.players.map(p=>({n:p.n, r:p.curRat})), r2: t2.players.map(p=>({n:p.n, r:p.curRat})) };
        
        t1.gf+=s1; t1.ga+=s2; t2.gf+=s2; t2.ga+=s1;
        if(s1>s2){ t1.pts+=3; t1.w++; t2.l++; } else if(s1<s2){ t2.pts+=3; t2.w++; t1.l++; } else { t1.pts++; t2.pts++; t1.d++; t2.d++; }
        
        db.history.unshift(match); db.round++; save(); updateUI();
    }

    function updateUI() {
        const my = db.teams.find(t => t.id === db.userTeamId);
        document.getElementById('u-money').innerText = db.money + ' M €';
        document.getElementById('my-club-card').innerHTML = `<div class="card" style="border:1px solid var(--neon)"><b>${my.name}</b> (Тур ${db.round-1})</div>`;
        
        let table = `<table><tr><th>КЛУБ</th><th>И</th><th>ГЗ</th><th>О</th></tr>`;
        [...db.teams].sort((a,b)=>b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga)).forEach(t => {
            table += `<tr><td>${t.name}</td><td>${t.w+t.d+t.l}</td><td>${t.gf}</td><td><b>${t.pts}</b></td></tr>`;
        });
        document.getElementById('main-table-container').innerHTML = table + `</table>`;

        let v = document.getElementById('tournament-view');
        if(db.view === 'league') {
            v.innerHTML = `<button class="btn" onclick="simLeague()">ИГРАТЬ ТУР</button>` + 
                db.history.map((m,i)=>`<div class="row-item" onclick="viewMatch(${i})"><span>${m.t1}</span><span class="score-box">${m.s1}:${m.s2}</span><span>${m.t2}</span></div>`).join('');
        } else if(db.view === 'market') {
            v.innerHTML = db.teams.flatMap(t => t.players.map((p,pi) => `<div class="row-item"><span>${p.n} (${t.name})</span><button class="btn" style="width:auto" onclick="buy(${t.id},${pi})">${p.rating} M</button></div>`)).join('');
        }
        document.getElementById('my-squad').innerHTML = my.players.map(p => `<div class="row-item"><span>${p.p} <b>${p.n}</b> <small style="color:var(--neon)">⚽ ${p.g}</small></span><span class="rating-badge">${p.rating}</span></div>`).join('');
    }

    function viewMatch(idx) {
        let m = db.history[idx];
        openModal(`
            <h2 style="text-align:center">${m.t1} ${m.s1}:${m.s2} ${m.t2}</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; background:var(--card-bg); padding:15px; border-radius:10px">
                <div><b>Оценки ${m.t1}</b><br>${m.r1.map(r=>r.n+': '+r.r).join('<br>')}</div>
                <div><b>Оценки ${m.t2}</b><br>${m.r2.map(r=>r.n+': '+r.r).join('<br>')}</div>
            </div>
            <p style="text-align:center; margin-top:10px; color:var(--yellow)">Голы: ${[...m.e1, ...m.e2].join(', ') || 'Нет'}</p>
        `);
    }

    function buy(tid, pi) {
        let seller = db.teams.find(t => t.id === tid);
        let buyer = db.teams.find(t => t.id === db.userTeamId);
        let p = seller.players[pi];
        if(db.money >= p.rating && tid !== db.userTeamId) {
            db.money -= p.rating;
            buyer.players.push(seller.players.splice(pi, 1)[0]);
            save(); updateUI();
        }
    }

    function openCasino() {
        openModal(`<div style="text-align:center"><h3>LUCKY 7</h3><div id="sl" style="font-size:40px; margin:20px 0;">❓ ❓ ❓</div><button class="btn" onclick="spin()">СТАВКА 10 M</button></div>`);
    }

    function spin() {
        if(db.money < 10) return; db.money -= 10;
        const i = ['⚽', '🏆', '💎', '7️⃣'];
        let r = [i[Math.floor(Math.random()*4)], i[Math.floor(Math.random()*4)], i[Math.floor(Math.random()*4)]];
        document.getElementById('sl').innerText = r.join(' ');
        if(r[0]==r[1] && r[1]==r[2]) { db.money += 70; alert("JACKPOT!"); }
        save(); updateUI();
    }

    function openModal(h) { document.getElementById('modal-body').innerHTML = h; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function nav(id, el) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
    function setTab(t) { db.view = t; updateUI(); }
    function exportData() { alert("Сейв в консоли!"); console.log(JSON.stringify(db)); }
    function resetSeason() { if(confirm("Сброс?")) { localStorage.clear(); location.reload(); } }

    for(let i=1; i<=30; i++) { 
        let b = document.createElement('button'); b.className = 'slot-btn'; b.innerText = 'СЛОТ '+i; b.onclick = () => selectSlot(i); document.getElementById('slot-container').appendChild(b); 
    }
</script>
</body>
                    </html>
