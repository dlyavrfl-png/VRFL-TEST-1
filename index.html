<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE</title>
    <style>
        :root { --neon: #00f2ff; --accent: #0055ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); --card-bg: #0d111a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .bg-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.03; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 30px 30px; }
        
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .card { background: var(--card-bg); border-radius: 15px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn { background: var(--accent); border: none; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #080a0f; border-top: 1px solid var(--glass); padding: 12px 0; justify-content: space-around; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .logo-s { width: 28px; height: 28px; border-radius: 6px; vertical-align: middle; margin-right: 10px; object-fit: cover; }
        .match-row { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .match-row:active { border-color: var(--neon); }

        .tabs { display: flex; background: #161b22; border-radius: 10px; padding: 4px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--accent); }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="app-container">
    <div class="header">
        <div style="font-weight: 900;"><span style="color:var(--neon)">VRFL</span> ELITE</div>
        <div id="u-money" style="color:#ffcf00; font-weight:bold">100.0M €</div>
    </div>

    <div class="main-content">
        <div id="sc-home" class="screen active">
            <div class="card" style="background: linear-gradient(45deg, #0d111a, #1a2a4a);">
                <h3 style="margin:0">Premier League</h3>
                <p style="font-size:12px; opacity:0.7">Сезон 2026 • Официальная Beta</p>
            </div>
            <h4 style="color:#4e5761; margin: 15px 5px; font-size: 12px;">УЧАСТНИКИ ЛИГИ</h4>
            <div id="home-clubs-list"></div>
        </div>

        <div id="sc-league" class="screen">
            <div class="tabs">
                <div class="tab active" id="tab-table" onclick="setLgMode('table')">ТАБЛИЦА</div>
                <div class="tab" id="tab-market" onclick="setLgMode('market')">ТРАНСФЕРЫ</div>
            </div>
            <div id="lg-content"></div>
            <div id="results-area" style="margin-top:20px"></div>
        </div>

        <div id="sc-club" class="screen">
            <div class="tabs">
                <div class="tab active" id="tab-p" onclick="setProfMode('player')">КАРЬЕРА ИГРОКА</div>
                <div class="tab" id="tab-m" onclick="setProfMode('manager')">МЕНЕДЖЕР</div>
            </div>
            <div id="prof-content"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-home', this)">КЛУБЫ</div>
        <div class="nav-item" onclick="nav('sc-league', this)">ЛИГА</div>
        <div class="nav-item" onclick="nav('sc-club', this)">ПРОФИЛЬ</div>
    </div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="card" id="m-content" onclick="event.stopPropagation()" style="margin-top: 50px;"></div>
</div>

<script>
    let state = {
        money: 100,
        myId: 4, // По умолчанию за Аутсайдеров
        lgMode: 'table',
        profMode: 'player',
        results: [],
        teams: [
            { id: 0, name: "Aurelian United", logo: "https://i.ibb.co.com/chQPDKjg/IMG-20260315-111459-312.png", pts: 0, w:0, d:0, l:0, players: [{n:"Тигран Казарян", r:90}, {n:"Stepaneko", r:90}, {n:"Лев Буфон", r:80}, {n:"Vortexov", r:80}, {n:"FeniOne", r:75}] },
            { id: 1, name: "FC Cardillero", logo: "https://i.ibb.co.com/PsmJjzJt/1773555326089.png", pts: 0, w:0, d:0, l:0, players: [{n:"Нелисек", r:90}, {n:"Atacker", r:90}, {n:"LeBoomich", r:90}, {n:"Reise flix", r:80}, {n:"Krujochek", r:80}] },
            { id: 2, name: "Torpedo", logo: "https://i.ibb.co.com/j9Sw1gpB/IMG-20260315-111455-660.png", pts: 0, w:0, d:0, l:0, players: [{n:"Фил", r:95}, {n:"Демпик", r:90}, {n:"Флориан Макс", r:90}, {n:"Ангел", r:80}, {n:"Нико Дж", r:80}] },
            { id: 3, name: "FC Potential", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Niko", r:90}, {n:"Flozzy Jr", r:80}, {n:"iron", r:80}, {n:"Egorinho", r:70}, {n:"Леонардо морети", r:70}] },
            { id: 4, name: "FC Outsiders", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Солевой", r:50}, {n:"Серджио", r:50}, {n:"Перез", r:50}, {n:"Максимилиан", r:50}, {n:"Костылин", r:50}, {n:"Вороговский", r:50}] }
        ],
        market: [
            {n: "Vaksekov", r: 88, p: 45, pos: "ST"},
            {n: "Dizzik", r: 85, p: 30, pos: "CM"},
            {n: "Gulik", r: 86, p: 35, pos: "LW"}
        ]
    };

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function setLgMode(m) { state.lgMode = m; render(); }
    function setProfMode(m) { state.profMode = m; render(); }

    function openClub(id) {
        const t = state.teams[id];
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-content').innerHTML = `
            <div style="text-align:center"><img src="${t.logo}" style="width:80px; border-radius:15px"><h2>${t.name}</h2></div>
            <div class="card" style="background:rgba(0,0,0,0.3)">
                <h4>ОСНОВНОЙ СОСТАВ:</h4>
                ${t.players.map(p => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222"><span>${p.n}</span><b style="color:var(--neon)">${p.r}</b></div>`).join('')}
            </div>
        `;
    }

    function buy(idx) {
        const p = state.market[idx];
        if(state.money >= p.p) {
            state.money -= p.p;
            state.teams[state.myId].players.push({n: p.n, r: p.r});
            state.market.splice(idx, 1);
            render();
            alert(`Контракт с ${p.n} подписан!`);
        } else alert("Недостаточно денег на балансе клуба!");
    }

    function simRound() {
        let res = [];
        let t = [...state.teams].sort(() => Math.random() - 0.5);
        for(let i=0; i<t.length-1; i+=2) {
            let s1 = Math.floor(Math.random()*5), s2 = Math.floor(Math.random()*3);
            t[i].pts += (s1>s2?3:(s1==s2?1:0));
            t[i+1].pts += (s2>s1?3:(s1==s2?1:0));
            res.push({t1: t[i], t2: t[i+1], s1, s2});
        }
        state.results = [...res, ...state.results];
        render();
    }

    function render() {
        document.getElementById('u-money').innerText = state.money + '.0M €';
        const my = state.teams[state.myId];

        // Клубы
        document.getElementById('home-clubs-list').innerHTML = state.teams.map(t => `
            <div class="match-row" onclick="openClub(${t.id})">
                <span><img src="${t.logo}" class="logo-s"><b>${t.name}</b></span>
                <span style="color:#4e5761; font-size:11px">ПРОСМОТР</span>
            </div>
        `).join('');

        // Лига / Трансферы
        document.getElementById('tab-table').className = 'tab ' + (state.lgMode=='table'?'active':'');
        document.getElementById('tab-market').className = 'tab ' + (state.lgMode=='market'?'active':'');
        
        if(state.lgMode == 'table') {
            let html = '<div class="card"><table>';
            [...state.teams].sort((a,b)=>b.pts-a.pts).forEach((t, i) => {
                html += `<tr><td style="width:20px; color:#4e5761">${i+1}</td><td><img src="${t.logo}" class="logo-s">${t.name}</td><td style="text-align:right"><b>${t.pts}</b></td></tr>`;
            });
            document.getElementById('lg-content').innerHTML = html + '</table></div><button class="btn" onclick="simRound()">СИМУЛИРОВАТЬ МАТЧИ</button>';
            document.getElementById('results-area').innerHTML = state.results.map(r => `
                <div class="match-row" style="justify-content:center; gap:20px">
                    <span>${r.t1.name}</span> <b style="color:var(--neon)">${r.s1}:${r.s2}</b> <span>${r.t2.name}</span>
                </div>
            `).join('');
        } else {
            document.getElementById('lg-content').innerHTML = state.market.map((p, i) => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:16px">${p.n}</b> <span style="color:#4e5761">[${p.pos}]</span><br><span style="color:var(--neon)">${p.p}M €</span> • OVR ${p.r}</div>
                    <button class="btn" style="width:auto; padding:8px 15px" onclick="buy(${i})">КУПИТЬ</button>
                </div>
            `).join('');
            document.getElementById('results-area').innerHTML = '';
        }

        // Профиль
        document.getElementById('tab-p').className = 'tab ' + (state.profMode=='player'?'active':'');
        document.getElementById('tab-m').className = 'tab ' + (state.profMode=='manager'?'active':'');
        
        if(state.profMode == 'player') {
            const myPlayer = my.players[0];
            document.getElementById('prof-content').innerHTML = `
                <div class="card" style="text-align:center; background: linear-gradient(180deg, #0d111a 0%, #0055ff22 100%);">
                    <img src="${my.logo}" style="width:70px; margin-bottom:10px">
                    <h2 style="margin:0">${myPlayer.n}</h2>
                    <p style="color:var(--neon); font-weight:bold; letter-spacing:2px">LEVEL 1</p>
                    <div style="font-size:42px; font-weight:900; margin:10px 0">${myPlayer.r}</div>
                    <div style="color:#4e5761; font-size:12px">РЕЙТИНГ ИГРОКА</div>
                </div>
            `;
        } else {
            document.getElementById('prof-content').innerHTML = `
                <div class="card">
                    <h3>Управление: ${my.name}</h3>
                    <div style="display:flex; justify-content:space-between; margin-top:20px">
                        <span>БАЛАНС:</span> <b style="color:#ffcf00">${state.money}M €</b>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px">
                        <span>СОСТАВ:</span> <b>${my.players.length} чел.</b>
                    </div>
                    <button class="btn" style="margin-top:20px; background:#161b22">НАСТРОИТЬ ТАКТИКУ</button>
                </div>
            `;
        }
    }

    render();
</script>
</body>
</html>
