<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE</title>
    <style>
        :root { --neon: #00f2ff; --accent: #7000ff; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.03); --card-bg: #161b22; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; text-align: left; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; scrollbar-width: none; }
        
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: linear-gradient(90deg, var(--accent), #b000ff); border: none; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #0d1117; border-top: 1px solid var(--glass); padding: 10px 0; justify-content: space-around; }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; opacity: 0.6; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--neon); opacity: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        td { padding: 12px 0; border-bottom: 1px solid var(--glass); }
        
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        .match-score { font-size: 18px; font-weight: 900; color: var(--neon); letter-spacing: 2px; }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; flex-direction: column; justify-content: center; }
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; padding: 20px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="color:var(--neon)">VRFL ELITE</h1>
    <p>ВЫБЕРИТЕ ВАШ КЛУБ</p>
    <div id="setup-list" style="overflow-y:auto"></div>
</div>

<div class="app-container">
    <div class="header">
        <div><span style="color:var(--neon)">VRFL</span> ELITE 2026</div>
        <div id="user-money" style="font-weight:bold; color:#ffcf00">0 €</div>
    </div>

    <div class="main-content" id="content">
        <div id="sc-home" class="screen active">
            <div class="card" style="background: linear-gradient(45deg, #1a1a2e, #16213e);">
                <h2 style="margin:0" id="my-team-name">Загрузка...</h2>
                <p style="color:#8b949e; font-size:12px">Турнир: VRFL Premier League</p>
                <button class="btn" style="width:auto; padding:5px 15px; margin-top:10px" onclick="nav('sc-league')">В ТАБЛИЦУ</button>
            </div>
            
            <h3>Соперники</h3>
            <div id="home-clubs-list"></div>
        </div>

        <div id="sc-league" class="screen">
            <div style="display:flex; gap:10px; margin-bottom:15px">
                <button class="btn" style="flex:1" onclick="renderTable()">ТАБЛИЦА</button>
                <button class="btn" style="flex:1; background: #333" onclick="renderMarket()">РЫНОК</button>
            </div>
            <div id="league-view">
                <div class="card"><div id="league-table"></div></div>
                <button class="btn" onclick="simulateRound()" id="sim-btn">СИМУЛИРОВАТЬ ТУР</button>
                <h4 style="margin:20px 0 10px 0">ПОСЛЕДНИЕ МАТЧИ</h4>
                <div id="round-matches"></div>
            </div>
        </div>

        <div id="sc-awards" class="screen">
            <div class="card" style="border:1px solid gold">
                <h3 style="margin:0">🏆 ЗОЛОТОЙ МЯЧ</h3>
                <div id="winner-ball" style="margin-top:10px">...</div>
            </div>
            <div class="card" style="border:1px solid #ff4d4d">
                <h3 style="margin:0">⚽ ЗОЛОТАЯ БУТСА</h3>
                <div id="winner-boot" style="margin-top:10px">...</div>
            </div>
        </div>

        <div id="sc-club" class="screen">
            <div class="card">
                <h3>Режим Карьеры</h3>
                <input type="text" id="player-name-input" placeholder="Введите имя игрока" style="width:100%; padding:10px; background:#000; border:1px solid var(--neon); color:#fff; border-radius:8px">
                <button class="btn" style="margin-top:10px" onclick="createPlayer()">СОЗДАТЬ / ОБНОВИТЬ ИГРОКА</button>
            </div>
            <div id="my-club-info"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="nav('sc-league', this)">ЛИГА</div>
        <div class="nav-item" onclick="nav('sc-awards', this)">НАГРАДЫ</div>
        <div class="nav-item" onclick="nav('sc-club', this)">МОЙ КЛУБ</div>
    </div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="card" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<script>
    let state = {
        userTeamId: -1,
        playerName: "Капитан",
        money: 100,
        teams: [
            { id: 0, name: "Aurelian United", logo: "https://i.ibb.co.com/chQPDKjg/IMG-20260315-111459-312.png", pts: 0, w:0, d:0, l:0, players: [{n:"Тигран Казарян", r:90, g:0}, {n:"Stepaneko", r:90, g:0}] },
            { id: 1, name: "FC Cardillero", logo: "https://i.ibb.co.com/PsmJjzJt/1773555326089.png", pts: 0, w:0, d:0, l:0, players: [{n:"Нелисек", r:90, g:0}, {n:"Atacker", r:90, g:0}] },
            { id: 2, name: "Torpedo", logo: "https://i.ibb.co.com/j9Sw1gpB/IMG-20260315-111455-660.png", pts: 0, w:0, d:0, l:0, players: [{n:"Фил", r:95, g:0}, {n:"Демпик", r:90, g:0}] },
            { id: 3, name: "FC Potential", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Niko", r:90, g:0}, {n:"Flozzy Jr", r:80, g:0}] },
            { id: 4, name: "FC Outsiders", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Солевой", r:50, g:0}, {n:"Костылин", r:50, g:0}] }
        ],
        market: [
            {n: "Vaksekov", r: 88, price: 50},
            {n: "Dizzik", r: 85, price: 35},
            {n: "Gulik", r: 86, price: 40}
        ],
        results: []
    };

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        updateUI();
    }

    function selectClub(id) {
        state.userTeamId = id;
        document.getElementById('setup-screen').style.display = 'none';
        updateUI();
    }

    function createPlayer() {
        let name = document.getElementById('player-name-input').value;
        if(name) {
            state.playerName = name;
            state.teams[state.userTeamId].players.unshift({n: name, r: 80, g: 0});
            alert("Игрок " + name + " создан и добавлен в состав!");
            updateUI();
        }
    }

    function simulateRound() {
        let round = [];
        let t = [...state.teams].sort(() => Math.random() - 0.5);
        for(let i=0; i<t.length-1; i+=2) {
            let s1 = Math.floor(Math.random()*4), s2 = Math.floor(Math.random()*3);
            t[i].pts += (s1>s2?3:(s1==s2?1:0));
            t[i+1].pts += (s2>s1?3:(s1==s2?1:0));
            
            // Запись голов
            let scorers = [];
            if(s1 > 0) scorers.push(t[i].players[0].n);
            round.push({t1: t[i].name, t2: t[i+1].name, s1, s2, scorers});
        }
        state.results = [...round, ...state.results];
        updateUI();
    }

    function showStats(idx) {
        let m = state.results[idx];
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <h2 style="text-align:center">${m.t1} ${m.s1}:${m.s2} ${m.t2}</h2>
            <hr border="0">
            <h4>ГОЛЫ:</h4>
            <p style="color:var(--neon)">${m.scorers.join(', ') || 'Нет голов'}</p>
            <p>УДАРЫ: ${m.s1+5} - ${m.s2+3}</p>
        `;
    }

    function renderTable() {
        let h = '<table><tr><th>#</th><th>КЛУБ</th><th>ОЧКИ</th></tr>';
        [...state.teams].sort((a,b)=>b.pts-a.pts).forEach((t, i) => {
            h += `<tr><td>${i+1}</td><td>${t.name}</td><td><b>${t.pts}</b></td></tr>`;
        });
        document.getElementById('league-view').innerHTML = `<div class="card">${h}</table></div><button class="btn" onclick="simulateRound()">ИГРАТЬ ТУР</button><div id="round-matches"></div>`;
        updateUI();
    }

    function renderMarket() {
        let h = '<h3>Трансферный Рынок</h3>';
        state.market.forEach((p, i) => {
            h += `<div class="card" style="display:flex; justify-content:space-between">
                <div><b>${p.n}</b> (OVR: ${p.r})</div>
                <button class="btn" style="width:auto; padding:5px" onclick="buyPlayer(${i})">${p.price}M €</button>
            </div>`;
        });
        document.getElementById('league-view').innerHTML = h;
    }

    function buyPlayer(idx) {
        let p = state.market[idx];
        if(state.money >= p.price) {
            state.money -= p.price;
            state.teams[state.userTeamId].players.push({n: p.n, r: p.r, g:0});
            state.market.splice(idx, 1);
            alert("Игрок куплен!");
            renderMarket();
        }
    }

    function updateUI() {
        if(state.userTeamId == -1) {
            let list = '';
            state.teams.forEach(t => list += `<div class="card" onclick="selectClub(${t.id})">${t.name}</div>`);
            document.getElementById('setup-list').innerHTML = list;
            return;
        }

        document.getElementById('user-money').innerText = state.money + ' M €';
        document.getElementById('my-team-name').innerText = state.teams[state.userTeamId].name;
        
        // Список клубов на главной
        let clubsH = '';
        state.teams.forEach(t => clubsH += `<div class="match-row" onclick="openClubInfo(${t.id})"><span>${t.name}</span><span>OVR: ${t.players[0].r}</span></div>`);
        document.getElementById('home-clubs-list').innerHTML = clubsH;

        // Матчи
        let matchesH = '';
        state.results.slice(0,5).forEach((m, i) => {
            matchesH += `<div class="match-row" onclick="showStats(${i})">
                <span>${m.t1}</span><span class="match-score">${m.s1}:${m.s2}</span><span>${m.t2}</span>
            </div>`;
        });
        if(document.getElementById('round-matches')) document.getElementById('round-matches').innerHTML = matchesH;
    }

    function openClubInfo(id) {
        let t = state.teams[id];
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `<h2>${t.name}</h2><p>СОСТАВ:</p>` + t.players.map(p => `<p>${p.n} (OVR: ${p.r})</p>`).join('');
    }

    updateUI();
</script>
</body>
    </html>
