<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE | OFFICIAL RELEASE</title>
    <style>
        :root { --neon: #00f2ff; --accent: #7000ff; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.03); --card-bg: #161b22; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        /* Узор фона */
        .bg-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.05; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 40px 40px; }

        /* ЗАГРУЗОЧНЫЙ ЭКРАН */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .loader-logo { width: 120px; height: 120px; border: 3px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; box-shadow: 0 0 20px var(--neon); }
        .loader-logo::after { content: '🏆'; font-size: 50px; }
        .loader-bar { width: 200px; height: 4px; background: #111; border-radius: 2px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); animation: load 2.5s forwards; }
        @keyframes load { to { width: 100%; } }

        /* ВЫБОР КЛУБА */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; padding: 25px; display: none; flex-direction: column; text-align: center; }
        
        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        .app-container { height: 100vh; display: flex; flex-direction: column; opacity: 0; transition: 1s; }
        .header { padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }

        .card { background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: linear-gradient(90deg, var(--accent), #b000ff); border: none; color: #fff; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #0d1117; border-top: 1px solid var(--glass); padding: 12px 0; justify-content: space-around; backdrop-filter: blur(20px); }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; opacity: 0.5; cursor: pointer; }
        .nav-item.active { color: var(--neon); opacity: 1; text-shadow: 0 0 10px var(--neon); }

        /* СПИСКИ */
        .logo-img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; margin-right: 12px; background: #000; border: 1px solid var(--glass); }
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .match-row:active { border-color: var(--neon); background: rgba(0,242,255,0.05); }
        .match-score { font-size: 20px; font-weight: 900; color: var(--neon); font-variant-numeric: tabular-nums; }

        /* МОДАЛКА (ОФОРМЛЕНИЕ КЛУБА) */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease; }
        .modal-header { height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #fff; cursor: pointer; z-index: 10; }
        .modal-body { padding: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div id="loading-screen">
    <div class="loader-logo"></div>
    <div style="color:var(--neon); font-weight:900; letter-spacing:3px; margin-bottom:10px">VRFL ELITE</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div id="setup-screen">
    <h2 style="color:var(--neon)">ВЫБЕРИ СВОЙ КЛУБ</h2>
    <p style="color:#8b949e; margin-bottom:30px">ЭТОТ ВЫБОР НЕЛЬЗЯ БУДЕТ ИЗМЕНИТЬ</p>
    <div id="setup-list" style="overflow-y:auto; flex-grow:1"></div>
</div>

<div class="app-container" id="app">
    <div class="header">
        <div style="font-weight: 900; font-size: 18px;"><span style="color:var(--neon)">VRFL</span> ELITE</div>
        <div id="user-money" style="font-weight:bold; color:#ffcf00; background: rgba(255,207,0,0.1); padding: 5px 12px; border-radius: 20px;">0 M €</div>
    </div>

    <div class="main-content">
        <div id="sc-home" class="screen active">
            <div class="card" id="my-team-card" style="background: linear-gradient(135deg, #1a1a2e 0%, #0055ff22 100%); border: 1px solid var(--neon);">
                <div style="display:flex; align-items:center">
                    <img id="my-team-logo" src="" class="logo-img" style="width:60px; height:60px">
                    <div>
                        <h2 id="my-team-name" style="margin:0">Загрузка...</h2>
                        <span id="my-team-rank" style="color:var(--neon); font-size:12px; font-weight:bold">TOP CLUB</span>
                    </div>
                </div>
            </div>
            
            <h4 style="color:#8b949e; letter-spacing:1px; margin: 20px 0 10px 5px">КЛУБЫ ПРЕМЬЕР-ЛИГИ</h4>
            <div id="home-clubs-list"></div>
        </div>

        <div id="sc-league" class="screen">
            <div style="display:flex; gap:10px; margin-bottom:15px">
                <button class="btn" style="flex:1" onclick="switchLeagueTab('table')">ТАБЛИЦА</button>
                <button class="btn" style="flex:1; background: #161b22; border:1px solid #333" onclick="switchLeagueTab('market')">РЫНОК</button>
            </div>
            <div id="league-view"></div>
        </div>

        <div id="sc-club" class="screen">
            <div class="card">
                <h3 style="margin-top:0">Моя Карьера</h3>
                <input type="text" id="player-name-input" placeholder="Имя Капитана..." style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px; margin-bottom:10px; box-sizing:border-box">
                <button class="btn" onclick="createPlayer()">ОБНОВИТЬ СОСТАВ</button>
            </div>
            <h4 style="color:#8b949e; margin: 10px 5px">ТЕКУЩИЙ СОСТАВ</h4>
            <div id="my-squad-display"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="nav('sc-league', this)">ЛИГА</div>
        <div class="nav-item" onclick="nav('sc-club', this)">МОЙ КЛУБ</div>
    </div>
</div>

<div id="modal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div id="modal-content"></div>
</div>

<script>
    let state = {
        userTeamId: -1,
        money: 150,
        teams: [
            { id: 0, name: "Aurelian United", logo: "https://i.ibb.co.com/chQPDKjg/IMG-20260315-111459-312.png", pts: 0, w:0, d:0, l:0, players: [{n:"Тигран Казарян", r:90, g:0}, {n:"Stepaneko", r:89, g:0}, {n:"Vortexov", r:82, g:0}] },
            { id: 1, name: "FC Cardillero", logo: "https://i.ibb.co.com/PsmJjzJt/1773555326089.png", pts: 0, w:0, d:0, l:0, players: [{n:"Нелисек", r:90, g:0}, {n:"Atacker", r:88, g:0}, {n:"LeBoomich", r:87, g:0}] },
            { id: 2, name: "Torpedo", logo: "https://i.ibb.co.com/j9Sw1gpB/IMG-20260315-111455-660.png", pts: 0, w:0, d:0, l:0, players: [{n:"Фил", r:95, g:0}, {n:"Демпик", r:91, g:0}, {n:"Ангел", r:85, g:0}] },
            { id: 3, name: "FC Potential", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Niko", r:89, g:0}, {n:"Flozzy Jr", r:84, g:0}, {n:"Iron", r:80, g:0}] },
            { id: 4, name: "FC Outsiders", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, w:0, d:0, l:0, players: [{n:"Солевой", r:55, g:0}, {n:"Костылин", r:58, g:0}] }
        ],
        results: [],
        curTab: 'table'
    };

    function save() { localStorage.setItem('vrfl_final_v1', JSON.stringify(state)); }
    
    // ИНИЦИАЛИЗАЦИЯ
    window.onload = () => {
        const saved = localStorage.getItem('vrfl_final_v1');
        if(saved) state = JSON.parse(saved);

        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                if(state.userTeamId === -1) {
                    document.getElementById('setup-screen').style.display = 'flex';
                    renderSetup();
                } else {
                    document.getElementById('app').style.opacity = '1';
                    updateUI();
                }
            }, 800);
        }, 2500);
    };

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        updateUI();
    }

    function renderSetup() {
        let h = '';
        state.teams.forEach(t => {
            h += `<div class="card" onclick="confirmClub(${t.id})" style="display:flex; align-items:center; background:#1c2128">
                    <img src="${t.logo}" class="logo-img">
                    <div style="text-align:left"><b>${t.name}</b><br><small style="color:#666">OVR: ${t.players[0].r}</small></div>
                  </div>`;
        });
        document.getElementById('setup-list').innerHTML = h;
    }

    function confirmClub(id) {
        state.userTeamId = id;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app').style.opacity = '1';
        save();
        updateUI();
    }

    function createPlayer() {
        let name = document.getElementById('player-name-input').value;
        if(name) {
            state.teams[state.userTeamId].players.unshift({n: name, r: 85, g: 0});
            alert("Капитан " + name + " добавлен в состав!");
            save();
            updateUI();
        }
    }

    function simulateRound() {
        let round = [];
        let t = [...state.teams].sort(() => Math.random() - 0.5);
        for(let i=0; i<t.length-1; i+=2) {
            let s1 = Math.floor(Math.random()*4), s2 = Math.floor(Math.random()*3);
            if(s1 > s2) { t[i].pts += 3; t[i].w++; t[i+1].l++; }
            else if(s1 < s2) { t[i+1].pts += 3; t[i+1].w++; t[i].l++; }
            else { t[i].pts++; t[i+1].pts++; t[i].d++; t[i+1].d++; }
            
            let scorers = [];
            if(s1 > 0) scorers.push(t[i].players[Math.floor(Math.random()*t[i].players.length)].n);
            round.push({t1: t[i], t2: t[i+1], s1, s2, scorers});
        }
        state.results = [...round, ...state.results];
        save();
        updateUI();
    }

    function switchLeagueTab(tab) {
        state.curTab = tab;
        updateUI();
    }

    function updateUI() {
        if(state.userTeamId === -1) return;
        const my = state.teams[state.userTeamId];
        
        document.getElementById('user-money').innerText = state.money + ' M €';
        document.getElementById('my-team-name').innerText = my.name;
        document.getElementById('my-team-logo').src = my.logo;

        // Главная
        document.getElementById('home-clubs-list').innerHTML = state.teams.map(t => `
            <div class="match-row" onclick="openClubDetail(${t.id})">
                <span style="display:flex; align-items:center"><img src="${t.logo}" class="logo-img"><b>${t.name}</b></span>
                <span style="color:var(--neon); font-size:12px">ИНФО</span>
            </div>
        `).join('');

        // Лига
        let lView = document.getElementById('league-view');
        if(state.curTab === 'table') {
            let tbl = '<table><tr><th>КЛУБ</th><th>В-Н-П</th><th>О</th></tr>';
            [...state.teams].sort((a,b)=>b.pts-a.pts).forEach((t, i) => {
                tbl += `<tr><td><img src="${t.logo}" class="logo-img" style="width:20px;height:20px">${t.name}</td><td>${t.w}-${t.d}-${t.l}</td><td><b>${t.pts}</b></td></tr>`;
            });
            lView.innerHTML = `<div class="card">${tbl}</table></div><button class="btn" onclick="simulateRound()">ИГРАТЬ ТУР</button>
                               <h4 style="margin:20px 0 10px 0">ПОСЛЕДНИЕ МАТЧИ</h4>
                               <div id="res-list"></div>`;
            document.getElementById('res-list').innerHTML = state.results.slice(0, 5).map((m, i) => `
                <div class="match-row" onclick="showMatchStats(${i})">
                    <span>${m.t1.name}</span><span class="match-score">${m.s1}:${m.s2}</span><span>${m.t2.name}</span>
                </div>
            `).join('');
        } else {
            // Маркет
            let mkt = '';
            state.teams.forEach(t => {
                if(t.id !== state.userTeamId) {
                    t.players.forEach((p, pi) => {
                        mkt += `<div class="card" style="display:flex; justify-content:space-between; align-items:center">
                                    <div><b>${p.n}</b> <small style="color:#666">(${t.name})</small><br><span style="color:#ffcf00">${Math.round(p.r/2)}M €</span></div>
                                    <button class="btn" style="width:auto; padding:8px 15px" onclick="buy(${t.id}, ${pi})">КУПИТЬ</button>
                                </div>`;
                    });
                }
            });
            lView.innerHTML = mkt;
        }

        // Мой клуб
        document.getElementById('my-squad-display').innerHTML = my.players.map(p => `
            <div class="match-row"><span>${p.n}</span><b style="color:var(--neon)">${p.r}</b></div>
        `).join('');
    }

    // ОФОРМЛЕНИЕ КЛУБА (КАК НА СКРИНШОТЕ 4)
    function openClubDetail(id) {
        const t = state.teams[id];
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <div class="modal-header" style="background: linear-gradient(180deg, ${id%2==0?'#7000ff':'#00f2ff'}44 0%, transparent 100%)">
                <img src="${t.logo}" style="width:100px; height:100px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5)">
                <h2 style="margin:15px 0 0 0">${t.name}</h2>
                <div style="font-size:12px; opacity:0.6">PROFESSIONAL CLUB VRFL</div>
            </div>
            <div class="modal-body">
                <div style="display:flex; gap:10px; margin-bottom:20px">
                    <div class="card" style="flex:1; text-align:center"><b>${t.pts}</b><br><small>ОЧКИ</small></div>
                    <div class="card" style="flex:1; text-align:center"><b>${t.players[0].r}</b><br><small>OVR</small></div>
                </div>
                <h3>СОСТАВ КОМАНДЫ</h3>
                ${t.players.map(p => `
                    <div class="match-row" style="background:rgba(255,255,255,0.01)">
                        <span>${p.n}</span><b style="color:var(--neon)">${p.r}</b>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function buy(tid, pidx) {
        let seller = state.teams[tid];
        let p = seller.players[pidx];
        let cost = Math.round(p.r / 2);
        if(state.money >= cost) {
            state.money -= cost;
            state.teams[state.userTeamId].players.push(p);
            seller.players.splice(pidx, 1);
            save(); updateUI();
            alert(p.n + " куплен!");
        } else alert("Нет денег!");
    }

    function showMatchStats(idx) {
        let m = state.results[idx];
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <div style="padding:40px; text-align:center">
                <h3>РЕЗУЛЬТАТ МАТЧА</h3>
                <div style="font-size:30px; font-weight:900; color:var(--neon); margin:20px 0">${m.t1.name} ${m.s1} : ${m.s2} ${m.t2.name}</div>
                <div class="card">
                    <h4>ГОЛЫ:</h4>
                    ${m.scorers.join(', ') || 'Нет забитых мячей'}
                </div>
                <button class="btn" style="margin-top:20px" onclick="closeModal()">ЗАКРЫТЬ</button>
            </div>
        `;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

</script>
</body>
    </html>
