<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FTCL ULTIMATE MANAGER</title>
    <style>
        :root { --neon: #00f2ff; --accent: #7000ff; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.03); --card-bg: #161b22; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; text-align: left; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; scrollbar-width: none; }
        .main-content::-webkit-scrollbar { display: none; }

        /* ЭКРАНЫ */
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        /* КАРТОЧКИ И ДИЗАЙН */
        .card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: linear-gradient(90deg, var(--accent), #b000ff); border: none; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #0d1117; border-top: 1px solid var(--glass); padding: 10px 0; justify-content: space-around; }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; opacity: 0.6; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--neon); opacity: 1; }

        /* ТАБЛИЦЫ И СТАТИСТИКА */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; color: #8b949e; font-weight: normal; padding-bottom: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid var(--glass); }
        .ovr-badge { background: #238636; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        .match-score { font-size: 18px; font-weight: 900; color: var(--neon); letter-spacing: 2px; }

        /* МОДАЛЬНЫЕ ОКНА */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 20px; flex-direction: column; justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div><span style="color:var(--neon)">FTCL</span> LEAGUE 2026</div>
        <div id="user-money" style="font-weight:bold; color:#ffcf00">0 €</div>
    </div>

    <div class="main-content" id="content">
        <div id="sc-home" class="screen active">
            <div class="card" style="background: linear-gradient(45deg, #1a1a2e, #16213e);">
                <h2 style="margin:0">FTCL Лига</h2>
                <p style="color:#8b949e; font-size:12px">Турнир в самом разгаре</p>
                <div style="display:flex; justify-content:space-between; margin-top:20px">
                    <span>Статус: <b style="color:#238636">Активен</b></span>
                    <button class="btn" style="width:auto; padding:5px 15px" onclick="nav('sc-league')">Открыть</button>
                </div>
            </div>
            <h3>Ваш Капитан</h3>
            <div id="hero-mini-card"></div>
        </div>

        <div id="sc-league" class="screen">
            <div class="card">
                <h4 style="margin:0 0 10px 0">ТАБЛИЦА ЧЕМПИОНАТА</h4>
                <div id="league-table"></div>
            </div>
            <button class="btn" onclick="simulateRound()" id="sim-btn">СИМУЛИРОВАТЬ ТУР</button>
            <h4 style="margin:20px 0 10px 0">МАТЧИ ТУРА</h4>
            <div id="round-matches"></div>
        </div>

        <div id="sc-awards" class="screen">
            <div class="card" style="border:1px solid gold">
                <h3 style="margin:0">🏆 ЗОЛОТОЙ МЯЧ</h3>
                <div id="winner-ball" style="margin-top:10px">Ожидание...</div>
            </div>
            <div class="card" style="border:1px solid #ff4d4d">
                <h3 style="margin:0">⚽ ЗОЛОТАЯ БУТСА</h3>
                <div id="winner-boot" style="margin-top:10px">Ожидание...</div>
            </div>
            <div class="card">
                <h3>ДОСТИЖЕНИЯ</h3>
                <div id="achievements-list"></div>
            </div>
        </div>

        <div id="sc-club" class="screen">
            <div id="my-manager-panel"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="nav('sc-league', this)">ЛИГА</div>
        <div class="nav-item" onclick="nav('sc-awards', this)">НАГРАДЫ</div>
        <div class="nav-item" onclick="nav('sc-club', this)">МОЙ КЛУБ</div>
    </div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="card" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<script>
    let state = {
        userTeamId: 0,
        money: 100,
        matchesPlayed: 0,
        teams: [
            { id: 0, name: "Cardillero", ovr: 82, pts: 0, w:0, d:0, l:0, budget: 150, players: [{n: "Vaksekov", g:0, m:0, r:88}, {n: "Dizzik", g:0, m:0, r:85}] },
            { id: 1, name: "Lions", ovr: 78, pts: 0, w:0, d:0, l:0, budget: 100, players: [{n: "Gulik", g:0, m:0, r:86}] },
            { id: 2, name: "Rovers", ovr: 74, pts: 0, w:0, d:0, l:0, budget: 80, players: [{n: "Captain Rose", g:0, m:0, r:75}] },
            { id: 3, name: "Torpedo", ovr: 70, pts: 0, w:0, d:0, l:0, budget: 70, players: [{n: "T. Blast", g:0, m:0, r:72}] }
        ],
        results: []
    };

    function save() { localStorage.setItem('ftcl_pro_save', JSON.stringify(state)); }
    function load() {
        const d = localStorage.getItem('ftcl_pro_save');
        if(d) state = JSON.parse(d);
        updateUI();
    }

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        updateUI();
    }

    function simulateRound() {
        let roundResults = [];
        let t = [...state.teams].sort(() => Math.random() - 0.5);
        
        for(let i=0; i<t.length; i+=2) {
            let t1 = t[i], t2 = t[i+1];
            let s1 = Math.floor(Math.random() * (t1.ovr/20));
            let s2 = Math.floor(Math.random() * (t2.ovr/22));
            
            if(s1 > s2) { t1.pts+=3; t1.w++; t2.l++; }
            else if(s1 < s2) { t2.pts+=3; t2.w++; t1.l++; }
            else { t1.pts++; t2.pts++; t1.d++; t2.d++; }

            let scorers = [];
            for(let g=0; g<s1; g++) {
                let p = t1.players[Math.floor(Math.random()*t1.players.length)];
                p.g++; p.m++; scorers.push(p.n);
                if(p.g % 10 === 0 && p.r < 100) p.r++;
            }

            roundResults.push({t1: t1.name, t2: t2.name, s1, s2, scorers});
        }
        state.results.unshift(...roundResults);
        state.matchesPlayed++;
        save();
        updateUI();
    }

    function updateUI() {
        document.getElementById('user-money').innerText = state.money + ' M €';
        
        // Таблица
        let tableH = '<table><tr><th>#</th><th>КЛУБ</th><th>В-Н-П</th><th>О</th></tr>';
        [...state.teams].sort((a,b) => b.pts - a.pts).forEach((t, i) => {
            tableH += `<tr><td>${i+1}</td><td>${t.name}</td><td>${t.w}-${t.d}-${t.l}</td><td><b>${t.pts}</b></td></tr>`;
        });
        document.getElementById('league-table').innerHTML = tableH + '</table>';

        // Матчи
        let matchH = '';
        state.results.slice(0, 4).forEach((m, i) => {
            matchH += `<div class="match-row" onclick="showStats(${i})">
                <span>${m.t1}</span>
                <span class="match-score">${m.s1} : ${m.s2}</span>
                <span>${m.t2}</span>
            </div>`;
        });
        document.getElementById('round-matches').innerHTML = matchH;

        // Награды
        let allPlayers = [];
        state.teams.forEach(t => allPlayers.push(...t.players));
        let bestScorer = [...allPlayers].sort((a,b) => b.g - a.g)[0];
        let bestPlayer = [...allPlayers].sort((a,b) => b.r - a.r)[0];
        
        document.getElementById('winner-ball').innerText = `${bestPlayer.n} (${bestPlayer.r} OVR)`;
        document.getElementById('winner-boot').innerText = `${bestScorer.n} (${bestScorer.g} голов)`;

        // Достижения
        let achH = '';
        if(bestScorer.g >= 50) achH += `<div class="card" style="color:var(--neon)">🎯 Легенда (50 голов) - ВЫПОЛНЕНО!</div>`;
        else achH += `<div class="card" style="opacity:0.5">🎯 Снайпер: ${bestScorer.g}/50 голов</div>`;
        document.getElementById('achievements-list').innerHTML = achH;
    }

    function showStats(index) {
        let m = state.results[index];
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <h2 style="text-align:center">${m.t1} ${m.s1}:${m.s2} ${m.t2}</h2>
            <hr style="border:0.1px solid var(--glass)">
            <h4>АВТОРЫ ГОЛОВ:</h4>
            <div style="color:var(--neon)">${m.scorers.join(', ') || 'Нет голов'}</div>
            <div style="margin-top:20px; display:flex; justify-content:space-around; font-size:12px; color:#8b949e">
                <div>УДАРЫ: ${m.s1*3+2}</div>
                <div>ВЛАДЕНИЕ: 55% / 45%</div>
            </div>
        `;
    }

    load();
</script>

</body>
</html>
