<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL PRO MANAGER</title>
    <style>
        :root { --neon: #0ff; --bg: #0a0a0a; --card: rgba(25, 25, 25, 0.98); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .app-container { background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://i.ibb.co/hxspt08L/751-11-20260315013231.png'); background-size: cover; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; text-align: center; border-bottom: 1px solid var(--neon); font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); position: relative; }
        .back-btn { position: absolute; left: 15px; top: 15px; display: none; cursor: pointer; color: var(--neon); font-size: 0.8rem; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--neon); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--neon); text-align: left; padding: 10px; border-bottom: 1px solid #333; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .score-big { font-size: 3.5rem; font-weight: 900; margin: 10px 0; text-shadow: 0 0 15px var(--neon); }
        .nav-bar { background: #000; border-top: 1px solid var(--neon); display: flex; position: fixed; bottom: 0; width: 100%; padding: 10px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #555; font-weight: bold; }
        .nav-item.active { color: var(--neon); }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: 900; border-radius: 8px; width: 100%; cursor: pointer; text-transform: uppercase; }
        .stat-val { color: var(--neon); font-weight: bold; }
        .player-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <span id="back-btn" class="back-btn" onclick="goBack()">← НАЗАД</span>
        <span id="header-title">VRFL PRO</span>
    </div>
    
    <div class="main-content">
        <div id="sc-match" class="screen active">
            <div class="card" style="text-align:center">
                <div style="font-size: 0.7rem; letter-spacing: 2px; color: #888;">СЛЕДУЮЩИЙ ТУР</div>
                <div id="m-pair" style="font-weight:bold; margin-top:10px; font-size: 1.1rem;">- vs -</div>
                <div class="score-big" id="m-score">0 : 0</div>
                <div id="m-scorers" style="font-size:0.8rem; color:var(--neon); margin-bottom:15px; min-height:1.2rem"></div>
                <button onclick="playMatch()">ИГРАТЬ МАТЧ</button>
            </div>
        </div>

        <div id="sc-table" class="screen">
            <div class="card">
                <h3 style="margin-top:0">ТУРНИР VRFL</h3>
                <table id="t-body"></table>
            </div>
        </div>

        <div id="sc-teams" class="screen">
            <div id="teams-list-container"></div>
        </div>

        <div id="sc-market" class="screen">
            <div class="card"><h3 style="color:var(--neon); margin-top:0">ТРАНСФЕРЫ</h3><div id="market-list"></div></div>
        </div>

        <div id="sc-details" class="screen">
            <div id="details-content"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-match', this)">МАТЧ</div>
        <div class="nav-item" onclick="nav('sc-table', this)">ТАБЛИЦА</div>
        <div class="nav-item" onclick="nav('sc-teams', this)">КЛУБЫ</div>
        <div class="nav-item" onclick="nav('sc-market', this)">РЫНОК</div>
    </div>
</div>

<script>
    let db = {
        teams: [
            { id: 0, name: "FC DEDUSHKI", ovr: 92, budget: 250, pts: 0, w:0, d:0, l:0, players: [{n: "Vaksekov", r: 94}, {n: "Gulik", r: 92}, {n: "Dizzik", r: 90}] },
            { id: 1, name: "ЖНЕЦ", ovr: 88, budget: 180, pts: 0, w:0, d:0, l:0, players: [{n: "Reaper", r: 89}, {n: "Ghost", r: 87}, {n: "Void", r: 88}] },
            { id: 2, name: "ROVERS", ovr: 85, budget: 140, pts: 0, w:0, d:0, l:0, players: [{n: "Speedy", r: 84}, {n: "Ace", r: 86}] },
            { id: 3, name: "CYBERFOOT", ovr: 82, budget: 100, pts: 0, w:0, d:0, l:0, players: [{n: "Bot-1", r: 80}, {n: "Bot-2", r: 83}] }
        ],
        market: [
            { n: "Mbappe", r: 92, p: 200 }, { n: "Haaland", r: 91, p: 190 }, 
            { n: "Bellingham", r: 89, p: 150 }, { n: "Vinicius", r: 90, p: 160 },
            { n: "Yamal", r: 82, p: 70 }, { n: "Musiala", r: 87, p: 110 }
        ],
        history: []
    };

    let currentPair = [0, 1];

    function nav(id, el) {
        document.getElementById('back-btn').style.display = 'none';
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
        
        if(id === 'sc-table') renderTable();
        if(id === 'sc-teams') renderTeamsList();
        if(id === 'sc-market') renderMarket();
        if(id === 'sc-match') updateMatchPair();
    }

    function updateMatchPair() {
        let i1 = Math.floor(Math.random() * db.teams.length);
        let i2; do { i2 = Math.floor(Math.random() * db.teams.length); } while (i1 === i2);
        currentPair = [i1, i2];
        document.getElementById('m-pair').innerText = `${db.teams[i1].name} vs ${db.teams[i2].name}`;
        document.getElementById('m-score').innerText = "0 : 0";
        document.getElementById('m-scorers').innerText = "";
    }

    function playMatch() {
        let t1 = db.teams[currentPair[0]], t2 = db.teams[currentPair[1]];
        let s1 = Math.floor(Math.random() * (t1.ovr / 20));
        let s2 = Math.floor(Math.random() * (t2.ovr / 20));
        document.getElementById('m-score').innerText = `${s1} : ${s2}`;
        
        let sc = [];
        for(let i=0; i<s1; i++) sc.push(t1.players[Math.floor(Math.random()*t1.players.length)].n);
        document.getElementById('m-scorers').innerText = sc.join(', ');

        if(s1 > s2) { t1.pts+=3; t1.w++; t2.l++; } 
        else if(s1 < s2) { t2.pts+=3; t2.w++; t1.l++; } 
        else { t1.pts++; t2.pts++; t1.d++; t2.d++; }
        if(window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function renderTable() {
        let h = '<tr><th>#</th><th>КЛУБ</th><th>В/Н/П</th><th>О</th></tr>';
        [...db.teams].sort((a,b) => b.pts - a.pts).forEach((t, i) => {
            h += `<tr onclick="showTeam(${t.id})"><td>${i+1}</td><td>${t.name}</td><td>${t.w}/${t.d}/${t.l}</td><td class="stat-val">${t.pts}</td></tr>`;
        });
        document.getElementById('t-body').innerHTML = h;
    }

    function renderTeamsList() {
        let h = '';
        db.teams.forEach(t => {
            h += `<div class="card" onclick="showTeam(${t.id})">
                <div style="display:flex; justify-content:space-between">
                    <b>${t.name}</b> <span class="stat-val">${t.ovr} OVR</span>
                </div>
                <div style="font-size:0.8rem; color:#888; margin-top:5px">Бюджет: ${t.budget}M | Игроков: ${t.players.length}</div>
            </div>`;
        });
        document.getElementById('teams-list-container').innerHTML = h;
    }

    function showTeam(id) {
        let t = db.teams.find(x => x.id === id);
        let pl = t.players.map(p => `<div class="player-item" onclick="showPlayer('${p.n}', ${p.r})"><span>${p.n}</span><span class="stat-val">${p.r}</span></div>`).join('');
        let h = `
            <div class="card">
                <h2 style="color:var(--neon); margin-top:0">${t.name}</h2>
                <p>Рейтинг состава: <span class="stat-val">${t.ovr}</span></p>
                <p>Бюджет клуба: <span class="stat-val">${t.budget}M</span></p>
                <h3 style="border-bottom:1px solid #333; padding-bottom:5px">СОСТАВ</h3>
                ${pl}
            </div>`;
        document.getElementById('details-content').innerHTML = h;
        openDetails();
    }

    function showPlayer(name, rating) {
        let h = `
            <div class="card" style="text-align:center">
                <div style="font-size:3rem">👤</div>
                <h2 style="color:var(--neon)">${name}</h2>
                <div style="font-size:1.5rem">Rating: <span class="stat-val">${rating}</span></div>
                <p style="color:#888; margin-top:20px">Статистика игрока в текущем сезоне доступна в полной версии VRFL.</p>
            </div>`;
        document.getElementById('details-content').innerHTML = h;
        openDetails();
    }

    function openDetails() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('sc-details').classList.add('active');
        document.getElementById('back-btn').style.display = 'block';
    }

    function goBack() { nav('sc-teams'); }

    function renderMarket() {
        let h = '';
        db.market.forEach((p, i) => {
            h += `<div class="player-item">
                <div><b>${p.n}</b> <span style="font-size:0.7rem; color:#888">(${p.r} OVR)</span></div>
                <button style="width:auto; padding:5px 15px" onclick="buy(${i})">${p.p}M</button>
            </div>`;
        });
        document.getElementById('market-list').innerHTML = h;
    }

    function buy(idx) {
        let p = db.market[idx];
        if(db.teams[0].budget >= p.p) {
            db.teams[0].budget -= p.p;
            db.teams[0].players.push({n: p.n, r: p.r});
            db.teams[0].ovr += 1;
            db.market.splice(idx, 1);
            alert('Сделка закрыта!');
            renderMarket();
        } else { alert('Клубу не хватает средств!'); }
    }

    updateMatchPair();
</script>
</body>
</html>
