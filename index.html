<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE</title>
    <style>
        :root { --neon: #00f2ff; --accent: #0055ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); --card-bg: #0d111a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        /* Узоры фона */
        .bg-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.05; background-image: linear-gradient(#00f2ff 1px, transparent 1px), linear-gradient(90deg, #00f2ff 1px, transparent 1px); background-size: 30px 30px; }

        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; scrollbar-width: none; }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .card { background: var(--card-bg); border-radius: 15px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { background: var(--accent); border: none; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #080a0f; border-top: 1px solid var(--glass); padding: 12px 0; justify-content: space-around; }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid var(--glass); font-size: 14px; }
        .logo-mini { width: 22px; height: 22px; border-radius: 4px; vertical-align: middle; margin-right: 8px; }

        /* Модалка выбора клуба */
        #setup-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 20px; display: none; flex-direction: column; }
        
        /* Переключатель режимов */
        .mode-switch { display: flex; background: #1a1f29; border-radius: 10px; padding: 4px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 8px; border-radius: 8px; text-align: center; font-size: 12px; cursor: pointer; }
        .mode-btn.active { background: var(--accent); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div id="setup-overlay">
    <h2 style="text-align:center; color:var(--neon)">ВЫБЕРИТЕ КЛУБ</h2>
    <div id="setup-list" style="overflow-y:auto; flex-grow:1"></div>
</div>

<div class="app-container">
    <div class="header">
        <div style="font-weight: 900; letter-spacing: 1px;"><span style="color:var(--neon)">VRFL</span> ELITE</div>
        <div id="user-money" style="font-weight:bold; color:#ffcf00">100.0 M €</div>
    </div>

    <div class="main-content">
        <div id="sc-home" class="screen active">
            <div class="card" style="background: linear-gradient(135deg, #0d111a, #16213e);">
                <h3 style="margin:0">Premier League</h3>
                <p style="color:#8b949e; font-size:12px">Тур 1 из 12</p>
                <button class="btn" style="margin-top:10px" onclick="nav('sc-league')">К ТАБЛИЦЕ</button>
            </div>
            
            <div class="section-title" style="margin: 15px 0 10px; color:#4e5761; font-weight:bold; font-size:12px">ДОСТУПНЫЕ ТУРНИРЫ</div>
            <div class="card" style="opacity:0.6">🏆 Elite Cup <span style="float:right; color:var(--neon)">СКОРО</span></div>
            <div class="card" style="opacity:0.6">⭐ Champions League <span style="float:right; color:#ff4d4d">ЗАКРЫТО</span></div>
        </div>

        <div id="sc-league" class="screen">
            <div class="mode-switch">
                <div class="mode-btn active" id="btn-tab" onclick="switchLeague('table')">ТАБЛИЦА</div>
                <div class="mode-btn" id="btn-mkt" onclick="switchLeague('market')">РЫНОК</div>
            </div>
            <div id="league-content"></div>
            <button class="btn" style="margin-top:15px" onclick="simRound()">СИМУЛИРОВАТЬ ТУР</button>
        </div>

        <div id="sc-awards" class="screen">
            <div class="card" style="border-left: 4px solid gold">
                <small>ЗОЛОТОЙ МЯЧ</small>
                <div id="ball-winner" style="font-weight:bold; font-size:18px">...</div>
            </div>
            <div class="card" style="border-left: 4px solid #00f2ff">
                <small>ЗОЛОТАЯ БУТСА</small>
                <div id="boot-winner" style="font-weight:bold; font-size:18px">...</div>
            </div>
        </div>

        <div id="sc-club" class="screen">
            <div class="mode-switch">
                <div class="mode-btn active" id="btn-player" onclick="switchProfile('player')">ИГРОК</div>
                <div class="mode-btn" id="btn-manager" onclick="switchProfile('manager')">МЕНЕДЖЕР</div>
            </div>
            <div id="profile-content"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="nav('sc-league', this)">ЛИГА</div>
        <div class="nav-item" onclick="nav('sc-awards', this)">НАГРАДЫ</div>
        <div class="nav-item" onclick="nav('sc-club', this)">МОЙ КЛУБ</div>
    </div>
</div>

<script>
    let state = {
        userTeamId: -1,
        money: 100,
        currentLeagueMode: 'table',
        currentProfileMode: 'player',
        teams: [
            { id: 0, name: "Aurelian United", logo: "https://i.ibb.co.com/chQPDKjg/IMG-20260315-111459-312.png", pts: 0, players: [{n:"Тигран Казарян", r:90, g:0}, {n:"Stepaneko", r:90, g:0}, {n:"Лев Буфон", r:80, g:0}] },
            { id: 1, name: "FC Cardillero", logo: "https://i.ibb.co.com/PsmJjzJt/1773555326089.png", pts: 0, players: [{n:"Нелисек", r:90, g:0}, {n:"Atacker", r:90, g:0}, {n:"LeBoomich", r:90, g:0}] },
            { id: 2, name: "Torpedo", logo: "https://i.ibb.co.com/j9Sw1gpB/IMG-20260315-111455-660.png", pts: 0, players: [{n:"Фил", r:95, g:0}, {n:"Демпик", r:90, g:0}, {n:"Флориан Макс", r:90, g:0}] },
            { id: 3, name: "FC Potential", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, players: [{n:"Niko", r:90, g:0}, {n:"Flozzy Jr", r:80, g:0}, {n:"iron", r:80, g:0}] },
            { id: 4, name: "FC Outsiders", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", pts: 0, players: [{n:"Солевой", r:50, g:0}, {n:"Серджио", r:50, g:0}, {n:"Перез", r:50, g:0}] }
        ]
    };

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        updateUI();
    }

    function switchLeague(mode) {
        state.currentLeagueMode = mode;
        document.getElementById('btn-tab').classList.toggle('active', mode==='table');
        document.getElementById('btn-mkt').classList.toggle('active', mode==='market');
        updateUI();
    }

    function switchProfile(mode) {
        state.currentProfileMode = mode;
        document.getElementById('btn-player').classList.toggle('active', mode==='player');
        document.getElementById('btn-manager').classList.toggle('active', mode==='manager');
        updateUI();
    }

    function selectTeam(id) {
        state.userTeamId = id;
        document.getElementById('setup-overlay').style.display = 'none';
        updateUI();
    }

    function simRound() {
        state.teams.forEach(t => {
            let goals = Math.floor(Math.random()*4);
            t.pts += (goals > 1 ? 3 : (goals === 1 ? 1 : 0));
            t.players[0].g += goals; // Просто для примера статистики
        });
        updateUI();
    }

    function updateUI() {
        if(state.userTeamId === -1) {
            document.getElementById('setup-overlay').style.display = 'flex';
            let h = '';
            state.teams.forEach(t => h += `<div class="card" onclick="selectTeam(${t.id})"><img src="${t.logo}" class="logo-mini"> ${t.name}</div>`);
            document.getElementById('setup-list').innerHTML = h;
            return;
        }

        document.getElementById('user-money').innerText = state.money + '.0 M €';
        const myTeam = state.teams[state.userTeamId];

        // Лига
        if(state.currentLeagueMode === 'table') {
            let html = '<table>';
            [...state.teams].sort((a,b)=>b.pts - a.pts).forEach((t, i) => {
                html += `<tr><td>${i+1}</td><td><img src="${t.logo}" class="logo-mini">${t.name}</td><td><b>${t.pts}</b></td></tr>`;
            });
            document.getElementById('league-content').innerHTML = `<div class="card">${html}</table></div>`;
        } else {
            document.getElementById('league-content').innerHTML = `<div class="card"><h4>РЫНОК ТРАНСФЕРОВ</h4><p style="font-size:12px">Нет доступных игроков в вашем бюджете.</p></div>`;
        }

        // Профиль
        if(state.currentProfileMode === 'player') {
            document.getElementById('profile-content').innerHTML = `
                <div class="card" style="text-align:center">
                    <img src="${myTeam.logo}" style="width:60px">
                    <h2>${myTeam.players[0].n}</h2>
                    <div style="color:var(--neon); font-weight:bold">OVR ${myTeam.players[0].r}</div>
                </div>
            `;
        } else {
            document.getElementById('profile-content').innerHTML = `
                <div class="card">
                    <h3>Управление: ${myTeam.name}</h3>
                    <p>Бюджет: ${state.money} M €</p>
                    <button class="btn" onclick="state.userTeamId=-1; updateUI()">СМЕНИТЬ КЛУБ</button>
                </div>
            `;
        }
    }

    window.onload = updateUI;
</script>

</body>
</html>
