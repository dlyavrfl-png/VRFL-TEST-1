<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ELITE | CASINO UPDATE</title>
    <style>
        :root { --neon: #00f2ff; --accent: #7000ff; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.05); --card-bg: #161b22; --yellow: #ffcf00; --red: #ff4d4d; --green: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .app { height: 100vh; display: flex; flex-direction: column; display: none; }
        .header { padding: 12px; background: #000; border-bottom: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; }
        .content { flex: 1; overflow-y: auto; padding: 10px 10px 100px 10px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.2s ease; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: linear-gradient(90deg, var(--accent), #b000ff); border: none; color: #fff; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-sec { background: #21262d; border: 1px solid #333; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #0d1117; border-top: 1px solid var(--glass); padding: 10px 0; justify-content: space-around; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; opacity: 0.6; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        .nav-item.active { color: var(--neon); opacity: 1; background: rgba(0, 242, 255, 0.1); }
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; }
        .score-box { font-size: 14px; font-weight: 900; color: var(--neon); background: #000; padding: 4px 8px; border-radius: 6px; }
        #modal { position: fixed; inset: 0; background: rgba(11, 14, 20, 0.98); z-index: 20000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-close { position: fixed; top: 15px; right: 15px; font-size: 28px; color: #fff; z-index: 20001; cursor: pointer; background: #000; border-radius: 50%; width: 40px; height: 40px; text-align: center; line-height: 38px; border: 1px solid #333; }
        #start-screen { position: fixed; inset: 0; background: var(--bg); z-index: 40000; display: flex; flex-direction: column; padding: 20px; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; overflow-y: auto; }
        .slot-btn { padding: 12px 2px; background: var(--card-bg); border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 10px; }
        .logo-sm { width: 24px; height: 24px; border-radius: 4px; vertical-align: middle; margin-right: 8px; }
        .color-chip { padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; flex: 1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="start-screen">
    <h3 style="text-align:center; color:var(--neon)">VRFL ELITE: LAUNCH</h3>
    <div class="slot-grid" id="slot-container"></div>
    <div id="team-selector" style="display:none; margin-top:20px">
        <h3 style="text-align:center; color:var(--neon)">ВЫБЕРИТЕ КЛУБ</h3>
        <div id="setup-list"></div>
    </div>
</div>

<div class="app">
    <div class="header">
        <div style="font-weight: 900;"><span style="color:var(--neon)">VRFL</span> ELITE</div>
        <div id="u-money" style="font-weight:bold; color:var(--yellow);">250 M €</div>
    </div>
    <div class="content">
        <div id="sc-home" class="screen active">
            <div id="my-club-card"></div>
            <button class="btn" style="margin-bottom:15px;" onclick="openCasinoMenu()">🎰 КАЗИНО ELITE</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 15px;">
                <button class="btn btn-sec" onclick="exportData()">💾 СЕЙВ</button>
                <button class="btn btn-sec" onclick="resetSeason()">🔄 СБРОС</button>
            </div>
            <h4 style="color:#8b949e">КЛУБЫ МИРА</h4>
            <div id="home-clubs"></div>
        </div>

        <div id="sc-tournaments" class="screen">
            <div style="display:flex; gap:5px; margin-bottom:15px">
                <button class="btn" onclick="setTab('league')">ЛИГА</button>
                <button class="btn btn-sec" onclick="setTab('ucl')">UCL</button>
                <button class="btn btn-sec" onclick="setTab('market')">РЫНОК</button>
            </div>
            <div id="tournament-view"></div>
        </div>

        <div id="sc-club" class="screen">
            <div class="card" style="border:1px solid var(--accent)">
                <div id="active-tactic-name" style="color:var(--neon); font-weight:bold;">Acsor (Баланс)</div>
                <button class="btn btn-sec" style="margin-top:10px" onclick="openTactics()">ТАКТИКА</button>
            </div>
            <h4 style="color:#8b949e">СОСТАВ</h4>
            <div id="my-squad"></div>
        </div>
    </div>
    <div class="nav">
        <div class="nav-item active" onclick="nav('sc-home', this)">ГЛАВНАЯ</div>
        <div class="nav-item" onclick="nav('sc-tournaments', this)">ТУРНИРЫ</div>
        <div class="nav-item" onclick="nav('sc-club', this)">КЛУБ</div>
    </div>
</div>

<div id="modal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div id="modal-body" style="padding:50px 15px 30px 15px;"></div>
</div>

<script>
    let activeSlot = null, storageKey = '', db = null;
    const baseTeams = [
        { id: 0, name: "Torpedo", logo: "https://i.ibb.co.com/r2g3f2Y6/1773561875719.png", players: [{n:"Ангел", r:80, p:"ВРТ"}, {n:"Фил", r:95, p:"ЛВ"}]},
        { id: 1, name: "Fc Cardillero", logo: "https://i.ibb.co.com/PsmJjzJt/1773555326089.png", players: [{n:"LeBoomich", r:90, p:"ФРВ"}]},
        { id: 2, name: "Fc Potential", logo: "https://i.ibb.co.com/svY6k9Yw/1773555376296.png", players: [{n:"Niko", r:90, p:"ЦП"}]},
        { id: 3, name: "Aurelian United", logo: "https://i.ibb.co.com/chQPDKjg/IMG-20260315-111459-312.png", players: [{n:"Тигран Казарян", r:90, p:"НАП"}]},
        { id: 4, name: "Fc Outsiders", logo: "https://i.ibb.co.com/xKbvhDsM/1773561900834.png", players: [{n:"Вороговский", r:60, p:"ПВ"}]},
        { id: 5, name: "Real Madrid", logo: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", players: [{n:"Mbappe", r:92, p:"ФРВ"}]},
        { id: 6, name: "Man City", logo: "https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg", players: [{n:"Haaland", r:91, p:"ФРВ"}]},
        { id: 7, name: "Bayern", logo: "https://upload.wikimedia.org/wikipedia/commons/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg", players: [{n:"Kane", r:90, p:"ФРВ"}]}
    ];

    function selectSlot(n) { 
        activeSlot = n; storageKey = `vrfl_rel_v1.2_s${n}`; 
        const s = localStorage.getItem(storageKey); 
        document.getElementById('slot-selector').style.display='none'; 
        if(s){ db=JSON.parse(s); startGame(); } else showTeamSelector(); 
    }
    
    function showTeamSelector() { 
        document.getElementById('team-selector').style.display='block'; 
        document.getElementById('setup-list').innerHTML = baseTeams.slice(0,5).map(t => 
            `<div class="card" style="display:flex; justify-content:space-between; align-items:center" onclick="initNew(${t.id})">
                <span><img src="${t.logo}" class="logo-sm">${t.name}</span>
                <button class="btn" style="width:auto">ВЫБРАТЬ</button>
            </div>`
        ).join(''); 
    }

    function initNew(tid) { 
        db = { userTeamId: tid, money: 250, round: 1, uclRound: 1, view: 'league', tactic: 'Acsor', teams: baseTeams.map(t => ({ ...t, pts: 0, w:0, d:0, l:0, gf:0, ga:0, players: t.players.map(p => ({...p, g:0, ratings:[]})) })), uclGroups: [], uclPlayoffs: null, uclResults: [], leagueResults: [] };
        let shuf = [...db.teams].sort(() => 0.5 - Math.random());
        for(let i=0; i<2; i++) db.uclGroups.push({ name: String.fromCharCode(65+i), teams: shuf.slice(i*4, i*4+4).map(t => ({id: t.id, pts:0})) });
        save(); startGame(); 
    }

    function startGame() { document.getElementById('start-screen').style.display='none'; document.querySelector('.app').style.display='flex'; updateUI(); }
    function save() { localStorage.setItem(storageKey, JSON.stringify(db)); }

    function updateUI() {
        const my = db.teams.find(t => t.id === db.userTeamId);
        document.getElementById('u-money').innerText = db.money + ' M €';
        document.getElementById('my-club-card').innerHTML = `<div class="card" style="border:1px solid var(--neon)"><b>${my.name}</b> (Тур ${db.round-1})</div>`;
        let v = document.getElementById('tournament-view');
        if(db.view === 'league') {
            v.innerHTML = `<button class="btn" onclick="simLeague()">ИГРАТЬ ТУР</button>` + db.leagueResults.slice(0,5).map(m=>`<div class="row-item"><span>${m.t1}</span><span class="score-box">${m.s1}:${m.s2}</span><span>${m.t2}</span></div>`).join('');
        } else if(db.view === 'market') {
            v.innerHTML = db.teams.flatMap(t => t.players.map((p,pi) => `<div class="row-item"><span>${p.n} (${t.name})</span><button class="btn" style="width:auto" onclick="buy(${t.id},${pi})">${p.r||50} M</button></div>`)).join('');
        }
        document.getElementById('my-squad').innerHTML = my.players.map(p => `<div class="row-item"><span>${p.p} <b>${p.n}</b></span></div>`).join('');
        document.getElementById('home-clubs').innerHTML = db.teams.map(t => `<div class="row-item"><img src="${t.logo}" class="logo-sm">${t.name} <b>${t.pts} PTS</b></div>`).join('');
    }

    function simLeague() {
        let vrfl = db.teams.slice(0, 4);
        let res = { t1: vrfl[0].name, t2: vrfl[1].name, s1: Math.floor(Math.random()*4), s2: Math.floor(Math.random()*4) };
        db.leagueResults.unshift(res); db.round++; save(); updateUI();
    }

    // --- КАЗИНО ---
    function openCasinoMenu() {
        openModal(`
            <h2 style="text-align:center; color:var(--yellow)">🎰 ELITE CASINO</h2>
            <button class="btn" style="margin-bottom:10px" onclick="openSlots()">LUCKY 7 (Эмодзи)</button>
            <button class="btn btn-sec" onclick="openColorGame()">ЦВЕТОВАЯ УДАЧА</button>
        `);
    }

    function openSlots() {
        openModal(`
            <div style="text-align:center">
                <h3>LUCKY 7</h3>
                <div style="display:flex; justify-content:center; gap:10px; margin:20px 0;">
                    <div id="s1" style="background:#000; padding:20px; border-radius:10px; font-size:40px; border:2px solid var(--accent)">⚽</div>
                    <div id="s2" style="background:#000; padding:20px; border-radius:10px; font-size:40px; border:2px solid var(--accent)">⚽</div>
                    <div id="s3" style="background:#000; padding:20px; border-radius:10px; font-size:40px; border:2px solid var(--accent)">⚽</div>
                </div>
                <button class="btn" onclick="spinSlots()">СТАВКА 10 M €</button>
            </div>
        `);
    }

    function spinSlots() {
        if(db.money < 10) return alert("Мало денег!");
        db.money -= 10;
        const icons = ['⚽', '🏆', '💎', '7️⃣'];
        let r1 = icons[Math.floor(Math.random()*4)], r2 = icons[Math.floor(Math.random()*4)], r3 = icons[Math.floor(Math.random()*4)];
        document.getElementById('s1').innerText = r1; document.getElementById('s2').innerText = r2; document.getElementById('s3').innerText = r3;
        if(r1==r2 && r2==r3) { let w = r1=='7️⃣'?100:40; db.money+=w; alert("ВЫИГРЫШ "+w+"M!"); }
        save(); updateUI();
    }

    function openColorGame() {
        openModal(`
            <div style="text-align:center">
                <h3>УГАДАЙ ЦВЕТ</h3>
                <p>Выберите цвет. Ставка: 20 M €</p>
                <div id="color-result" style="height:60px; border-radius:12px; margin-bottom:15px; background:var(--glass); line-height:60px; font-weight:bold; font-size:20px">? ? ?</div>
                <div style="display:flex; gap:10px">
                    <div class="color-chip" style="background:var(--red)" onclick="playColor('red')">X2</div>
                    <div class="color-chip" style="background:#111; border:1px solid #444" onclick="playColor('black')">X2</div>
                    <div class="color-chip" style="background:var(--green)" onclick="playColor('green')">X14</div>
                </div>
            </div>
        `);
    }

    function playColor(choice) {
        if(db.money < 20) return alert("Мало денег!");
        db.money -= 20;
        let rand = Math.random() * 100;
        let winColor = '';
        if(rand < 47) winColor = 'red';
        else if(rand < 94) winColor = 'black';
        else winColor = 'green';

        let resBox = document.getElementById('color-result');
        resBox.style.background = winColor === 'red' ? 'var(--red)' : (winColor === 'black' ? '#000' : 'var(--green)');
        resBox.innerText = winColor.toUpperCase();

        if(choice === winColor) {
            let mult = (winColor === 'green' ? 14 : 2);
            let winAmount = 20 * mult;
            db.money += winAmount;
            alert("ПОБЕДА! + " + winAmount + " M €");
        }
        save(); updateUI();
    }

    // Системные функции
    function openModal(html) { document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function nav(id, el) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
    function setTab(t) { db.view = t; updateUI(); }
    function exportData() { alert("Сейв скопирован!"); }
    function resetSeason() { localStorage.clear(); location.reload(); }

    let sCont = document.getElementById('slot-container'); 
    for(let i=1; i<=30; i++) { 
        let b = document.createElement('button'); b.className = 'slot-btn'; b.innerText = 'СЛОТ '+i; b.onclick = () => selectSlot(i); sCont.appendChild(b); 
    }
</script>
</body>
    </html>
