<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRFL ULTIMATE CAREER</title>
    <style>
        :root { --neon: #0ff; --accent: #ff00ff; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .app-container { 
            background: radial-gradient(circle at top right, #1a1a1a, #050505); 
            height: 100vh; display: flex; flex-direction: column; position: relative;
        }
        
        /* ЭКРАН ВЫБОРА КЛУБА */
        #setup-screen { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .header { padding: 15px; text-align: center; border-bottom: 1px solid var(--glass); font-weight: 900; color: var(--neon); letter-spacing: 2px; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .screen { display: none; animation: slideUp 0.3s ease-out; }
        .screen.active { display: block; }

        .card { 
            background: var(--glass); border: 1px solid rgba(0, 255, 255, 0.1); 
            backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 15px;
        }

        .btn-neon { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon); 
            padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .btn-neon:active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        .nav-bar { 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-top: 1px solid var(--glass);
            display: flex; position: fixed; bottom: 0; width: 100%; padding: 12px 0;
        }
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #555; transition: 0.3s; }
        .nav-item.active { color: var(--neon); transform: translateY(-3px); }

        .score-big { font-size: 4rem; font-weight: 900; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }
        input, select { 
            background: #111; border: 1px solid #333; color: #fff; padding: 10px; width: 100%; 
            border-radius: 8px; margin-bottom: 10px; box-sizing: border-box;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="setup-screen">
        <h1 style="color:var(--neon)">VRFL CAREER</h1>
        <p style="color:#888">Выберите ваш первый клуб:</p>
        <div id="start-teams" style="width:100%"></div>
        <hr style="width:100%; border:0.5px solid #222; margin:20px 0">
        <p style="color:#888">Создать своего игрока:</p>
        <input type="text" id="my-player-name" placeholder="Ваше Имя">
        <select id="my-player-pos">
            <option value="ST">Нападающий (ST)</option>
            <option value="MID">Полузащитник (MID)</option>
            <option value="DEF">Защитник (DEF)</option>
        </select>
        <button class="btn-neon" onclick="finishSetup()">НАЧАТЬ КАРЬЕРУ</button>
    </div>

    <div class="header" id="app-header">VRFL MANAGER</div>

    <div class="main-content">
        <div id="sc-match" class="screen active">
            <div class="card" style="text-align:center">
                <div id="m-pair" style="font-size:1.2rem; font-weight:bold">- vs -</div>
                <div class="score-big" id="m-score">0 : 0</div>
                <div id="m-scorers" style="font-size:0.85rem; color:var(--neon); min-height:1.5rem"></div>
                <button class="btn-neon" onclick="playMatch()">СИМУЛИРОВАТЬ</button>
            </div>
            <div id="match-stats-card" class="card" style="display:none">
                <h4 style="margin:0">СТАТИСТИКА МАТЧА</h4>
                <div id="stat-details" style="font-size:0.8rem; color:#ccc; margin-top:10px"></div>
            </div>
        </div>

        <div id="sc-table" class="screen">
            <div class="card">
                <h3>ТАБЛИЦА ЛИГИ</h3>
                <div id="league-table"></div>
            </div>
        </div>

        <div id="sc-market" class="screen">
            <div class="card">
                <h3>РЫНОК ТРАНСФЕРОВ</h3>
                <div id="market-items"></div>
            </div>
        </div>

        <div id="sc-profile" class="screen">
            <div class="card">
                <h3 id="user-team-name">МОЙ КЛУБ</h3>
                <p>Бюджет: <span id="user-budget" style="color:var(--neon)">-</span>M</p>
                <p>Рейтинг: <span id="user-ovr" style="color:var(--accent)">-</span></p>
                <hr style="border:0.5px solid #333">
                <h4>МОЙ ИГРОК</h4>
                <div id="my-hero-card"></div>
                <button class="btn-neon" style="border-color:#ff4444; color:#ff4444; margin-top:30px" onclick="resetGame()">СБРОСИТЬ ВСЁ</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sc-match', this)">МАТЧ</div>
        <div class="nav-item" onclick="nav('sc-table', this)">ТАБЛИЦА</div>
        <div class="nav-item" onclick="nav('sc-market', this)">РЫНОК</div>
        <div class="nav-item" onclick="nav('sc-profile', this)">ПРОФИЛЬ</div>
    </div>
</div>

<script>
    let state = {
        userTeamId: null,
        myPlayer: null,
        teams: [
            { id: 0, name: "FC DEDUSHKI", ovr: 92, budget: 250, pts: 0, players: ["Gulik", "Dizzik", "Vaksekov"] },
            { id: 1, name: "ЖНЕЦ", ovr: 88, budget: 180, pts: 0, players: ["Reaper", "Ghost", "Void"] },
            { id: 2, name: "ROVERS", ovr: 85, budget: 140, pts: 0, players: ["Speedy", "Ace", "Tank"] },
            { id: 3, name: "CYBERFOOT", ovr: 80, budget: 100, pts: 0, players: ["Bot1", "Bot2", "Bot3"] }
        ],
        market: [
            { n: "Mbappe", r: 92, p: 210 }, { n: "Haaland", r: 91, p: 195 },
            { n: "Yamal", r: 84, p: 80 }, { n: "Musiala", r: 88, p: 120 }
        ]
    };

    // Загрузка данных
    const saved = localStorage.getItem('vrfl_save');
    if(saved) {
        state = JSON.parse(saved);
        document.getElementById('setup-screen').style.display = 'none';
    }

    function save() { localStorage.setItem('vrfl_save', JSON.stringify(state)); }

    function initSetup() {
        let h = '';
        state.teams.forEach(t => {
            h += `<div class="card" onclick="selectStartTeam(${t.id})" id="st-${t.id}" style="padding:10px; cursor:pointer">${t.name}</div>`;
        });
        document.getElementById('start-teams').innerHTML = h;
    }

    function selectStartTeam(id) {
        state.userTeamId = id;
        document.querySelectorAll('#start-teams .card').forEach(c => c.style.borderColor = 'rgba(0,255,255,0.1)');
        document.getElementById(`st-${id}`).style.borderColor = 'var(--neon)';
    }

    function finishSetup() {
        const name = document.getElementById('my-player-name').value || "Player";
        const pos = document.getElementById('my-player-pos').value;
        if(state.userTeamId === null) return alert('Выберите клуб!');
        
        state.myPlayer = { name, pos, r: 75 };
        state.teams[state.userTeamId].players.push(name);
        document.getElementById('setup-screen').style.display = 'none';
        save();
        nav('sc-match');
    }

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'sc-table') renderTable();
        if(id === 'sc-market') renderMarket();
        if(id === 'sc-profile') renderProfile();
    }

    function playMatch() {
        let t1 = state.teams[state.userTeamId];
        let t2 = state.teams[Math.floor(Math.random()*state.teams.length)];
        if(t1.id === t2.id) t2 = state.teams[(t2.id+1)%state.teams.length];

        document.getElementById('m-pair').innerText = `${t1.name} vs ${t2.name}`;
        
        let s1 = Math.floor(Math.random() * (t1.ovr/20 + 1));
        let s2 = Math.floor(Math.random() * (t2.ovr/22 + 1));
        document.getElementById('m-score').innerText = `${s1} : ${s2}`;

        let scorers = [];
        for(let i=0; i<s1; i++) scorers.push(t1.players[Math.floor(Math.random()*t1.players.length)]);
        document.getElementById('m-scorers').innerText = scorers.length ? "Голы: " + scorers.join(', ') : "Нет голов";

        if(s1 > s2) t1.pts += 3; else if (s1 === s2) { t1.pts++; t2.pts++; } else t2.pts += 3;
        
        document.getElementById('match-stats-card').style.display = 'block';
        document.getElementById('stat-details').innerHTML = `Владение: ${50+s1}% - ${50-s1}%<br>Удары: ${s1*3} - ${s2*2}`;
        
        save();
    }

    function renderTable() {
        let h = '<table style="width:100%; font-size:0.9rem"><tr><th>Клуб</th><th>Очки</th></tr>';
        [...state.teams].sort((a,b) => b.pts - a.pts).forEach(t => {
            h += `<tr><td>${t.name}</td><td>${t.pts}</td></tr>`;
        });
        document.getElementById('league-table').innerHTML = h + '</table>';
    }

    function renderMarket() {
        let h = '';
        state.market.forEach((p, i) => {
            h += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center">
                <span>${p.n} (${p.r})</span>
                <button class="btn-neon" style="width:auto; padding:5px 10px" onclick="buy(${i})">${p.p}M</button>
            </div>`;
        });
        document.getElementById('market-items').innerHTML = h;
    }

    function buy(i) {
        let p = state.market[i];
        let userTeam = state.teams[state.userTeamId];
        if(userTeam.budget >= p.p) {
            userTeam.budget -= p.p;
            userTeam.players.push(p.n);
            userTeam.ovr += 1;
            state.market.splice(i, 1);
            alert('Трансфер завершен!');
            renderMarket();
            save();
        } else alert('Мало денег!');
    }

    function renderProfile() {
        let t = state.teams[state.userTeamId];
        document.getElementById('user-team-name').innerText = t.name;
        document.getElementById('user-budget').innerText = t.budget;
        document.getElementById('user-ovr').innerText = t.ovr;
        document.getElementById('my-hero-card').innerHTML = `
            <div style="background:linear-gradient(45deg, #111, #222); padding:15px; border-radius:10px; border-left:4px solid var(--accent)">
                <b>${state.myPlayer.name}</b> [${state.myPlayer.pos}]<br>
                Рейтинг: ${state.myPlayer.r}
            </div>`;
    }

    function resetGame() {
        if(confirm('Вы уверены, что хотите сбросить весь прогресс?')) {
            localStorage.removeItem('vrfl_save');
            location.reload();
        }
    }

    initSetup();
</script>

</body>
</html>
